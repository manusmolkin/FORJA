const {useState,useEffect,useCallback} = React;

const STORAGE_KEY="forja-data", API_KEY_STORAGE="forja-api-key";

const MG={

  back:{label:"Espalda",icon:"🔙",color:"#3498DB"},
  shoulders:{label:"Hombros",icon:"🔺",color:"#E67E22"},
  biceps:{label:"Bíceps",icon:"💪",color:"#2ECC71"},
  triceps:{label:"Tríceps",icon:"🦾",color:"#1ABC9C"},
  legs:{label:"Piernas",icon:"🦵",color:"#9B59B6"},

  abs:{label:"Abdominales",icon:"🎯",color:"#E91E63"},

  back:["Dominadas","Remo con barra","Remo con mancuerna","Jalón al pecho","Remo en polea baja","Pull-over"],
  shoulders:["Press militar","Elevaciones laterales","Elevaciones frontales","Pájaros","Face pull","Press Arnold"],
  biceps:["Curl con barra","Curl con mancuernas","Curl martillo","Curl concentrado","Curl en polea","Curl predicador"],
  triceps:["Extensión en polea","Press francés","Fondos en banco","Patada de tríceps","Extensión sobre cabeza","Press cerrado"],
  legs:["Sentadilla","Prensa","Extensión de cuádriceps","Curl femoral","Peso muerto rumano","Zancadas","Sentadilla búlgara"],
  glutes:["Hip thrust","Peso muerto sumo","Patada de glúteo","Abducción de cadera","Puente de glúteo"],
  abs:["Crunch","Plancha","Ab wheel","Elevación de piernas","Russian twist","Crunch en polea"],
  forearms:["Curl de muñeca","Curl reverso","Farmer walk","Dead hang"],

const CT={
  running:{label:"Correr",icon:"🏃",unit:"km",su:"min"},
  cycling:{label:"Bicicleta",icon:"🚴",unit:"km",su:"min"},
  swimming:{label:"Nadar",icon:"🏊",unit:"m",su:"min"},
  rowing:{label:"Remo",icon:"🚣",unit:"m",su:"min"},
  jump_rope:{label:"Saltar soga",icon:"⏭️",unit:"min",su:"saltos"},

  hiit:{label:"HIIT",icon:"⚡",unit:"min",su:"rondas"},

  stairs:{label:"Escaleras",icon:"🪜",unit:"pisos",su:"min"},
};

const td=()=>new Date().toISOString().slice(0,10);
const fd=(d)=>new Date(d+"T12:00:00").toLocaleDateString("es-AR",{day:"numeric",month:"short",year:"numeric"});
const gid=()=>Math.random().toString(36).substr(2,9);
const ld=()=>{try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null}catch{return null}};
const sv=(d)=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}catch{}};
const gk=()=>{try{return localStorage.getItem(API_KEY_STORAGE)||""}catch{return""}};
const sk=(k)=>{try{localStorage.setItem(API_KEY_STORAGE,k)}catch{}};

const EMPTY={sessions:[],cardioSessions:[],customExercises:{},coachNotes:[]};

function tgt(history){
  if(!history?.length)return null;
  const last=history.at(-1),sets=last.sets||[];
  if(!sets.length)return null;
  const avg=sets.reduce((s,x)=>s+x.reps,0)/sets.length;
  const mw=Math.max(...sets.map(s=>s.weight));
  let tw=mw,tr=Math.round(avg),ts=sets.length,sug="";
  if(avg>=12){tw=Math.ceil((mw*1.025)/0.5)*0.5;tr=8;sug=`Subir peso a ${tw}kg. Apuntar a 8 reps.`}
  else if(avg>=8){tr=Math.round(avg)+1;sug=`Mantener ${mw}kg. Apuntar a ${tr} reps.`}
  else if(avg>=6){if(sets.length<5){ts=sets.length+1;sug=`Mantener ${mw}kg × ${Math.round(avg)} reps. Agregar 1 serie (total ${ts}).`}else{tr=Math.round(avg)+1;sug=`Mantener ${mw}kg. Intentar ${tr} reps.`}}
  else{tw=Math.floor((mw*0.95)/0.5)*0.5;tr=8;sug=`Reducir peso a ${tw}kg para lograr 8 reps con buena técnica.`}
  return{targetWeight:tw,targetReps:tr,targetSets:ts,suggestion:sug};
}

function coachPrompt(ses,all,fb){
  const exd=ses.exercises.map(ex=>{const ss=ex.sets.map((s,i)=>`  Serie ${i+1}: ${s.weight}kg × ${s.reps} reps`).join("\n");return`${ex.name} (${MG[ex.muscleGroup]?.label}):\n${ss}`}).join("\n\n");
  const recent=all.slice(-5).map(s=>`${fd(s.date)}: ${[...new Set(s.exercises.map(e=>MG[e.muscleGroup]?.label))].join(", ")}`).join("\n");
  return`Sos un coach de fuerza e hipertrofia basado en evidencia (ACSM, NSCA, Schoenfeld et al.).
El usuario completó esta sesión:
Fecha: ${fd(ses.date)}
Ejercicios:\n${exd}
Sesiones recientes:\n${recent}
Comentario: "${fb}"
Respondé en español, conciso (máx 150 palabras). Evaluá:
1. Volumen e intensidad para fuerza/hipertrofia.
2. Recomendaciones concretas para la próxima sesión.
3. Frecuencia y recuperación.
Sé directo y práctico.`;
}

async function callAI(prompt,key){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(c=>c.text||"").join("")||"Sin respuesta.";
}

const S={
  app:{fontFamily:"'Source Sans 3',sans-serif",background:"#0A0A0B",minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column",color:"#E0E0E0"},
  header:{padding:"16px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid rgba(255,107,53,0.15)",background:"linear-gradient(180deg,rgba(255,107,53,0.06) 0%,transparent 100%)"},
  content:{flex:1,overflowY:"auto",paddingBottom:80},
  page:{padding:"20px 16px"},
  tabBar:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,display:"flex",background:"rgba(15,15,16,0.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"6px 0 env(safe-area-inset-bottom,8px)",zIndex:100},
  tab:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 0",background:"none",border:"none",color:"#666",cursor:"pointer"},
  tabA:{color:"#FF6B35"},
  st:{fontFamily:"'Oswald',sans-serif",fontSize:18,fontWeight:600,color:"#FFF",margin:"0 0 12px",letterSpacing:0.5},
  hero:{background:"linear-gradient(135deg,rgba(255,107,53,0.12),rgba(214,40,40,0.08))",border:"1px solid rgba(255,107,53,0.2)",borderRadius:16,padding:24,textAlign:"center"},
  btn:{background:"linear-gradient(135deg,#FF6B35,#D62828)",color:"#FFF",border:"none",borderRadius:12,padding:"14px 24px",fontSize:15,fontWeight:700,fontFamily:"'Oswald',sans-serif",letterSpacing:1,cursor:"pointer"},
  card:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:16,marginBottom:10},
  mg:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8},
  mb:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"12px 8px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,cursor:"pointer",color:"#CCC"},
  inp:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 10px",color:"#FFF",fontSize:14,width:"100%",boxSizing:"border-box",fontFamily:"'Source Sans 3',sans-serif"},
  ta:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 14px",color:"#FFF",fontSize:14,width:"100%",boxSizing:"border-box",fontFamily:"'Source Sans 3',sans-serif",resize:"vertical"},
  lbl:{fontSize:12,color:"#888",marginBottom:4,display:"block",fontWeight:600,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Oswald',sans-serif"},
  chk:{width:32,height:32,borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"},
  sm:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#888",cursor:"pointer",padding:"4px 10px",fontSize:14},
  as:{background:"none",border:"1px dashed rgba(255,255,255,0.15)",borderRadius:8,color:"#888",cursor:"pointer",padding:"6px 12px",fontSize:12,width:"100%",marginTop:6},
  eo:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:10,cursor:"pointer",color:"#DDD",fontSize:14,width:"100%",textAlign:"left",fontFamily:"'Source Sans 3',sans-serif"},
  ch:{fontSize:11,color:"#666",textAlign:"center",fontWeight:600,textTransform:"uppercase",fontFamily:"'Oswald',sans-serif"},
  tb:{marginTop:8,padding:"8px 12px",background:"rgba(255,107,53,0.1)",border:"1px solid rgba(255,107,53,0.2)",borderRadius:8,fontSize:12,color:"#FF6B35"},
  ai:{background:"linear-gradient(135deg,rgba(255,107,53,0.08),rgba(214,40,40,0.05))",border:"1px solid rgba(255,107,53,0.15)",borderRadius:16,padding:20},
  sc:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:12,padding:16,textAlign:"center"},
  sv:{fontFamily:"'Oswald',sans-serif",fontSize:28,fontWeight:700,color:"#FF6B35",display:"block"},
  su:{fontSize:14,color:"#888",fontWeight:400},
  sl:{fontSize:11,color:"#888",display:"block",marginTop:4,textTransform:"uppercase",letterSpacing:1,fontFamily:"'Oswald',sans-serif"},
};

  return <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
    <rect width="100" height="100" rx="20" fill="url(#fg2)"/>
    <defs><linearGradient id="fg2" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stopColor="#FF6B35"/><stop offset="100%" stopColor="#D62828"/></linearGradient></defs>
    <path d="M25 65 L75 65 L70 55 L65 45 L35 45 L30 55 Z" fill="#FFF" opacity="0.95"/>
    <rect x="40" y="30" width="20" height="18" rx="3" fill="#FFF" opacity="0.95"/>
    <rect x="20" y="65" width="60" height="6" rx="3" fill="#FFF" opacity="0.7"/>
    <circle cx="72" cy="32" r="3" fill="#FFD166"/><circle cx="78" cy="26" r="2" fill="#FFD166" opacity="0.7"/><circle cx="65" cy="28" r="1.5" fill="#FFD166" opacity="0.5"/>
  </svg>;
}

function TabBar({active,onChange}){
  const tabs=[{id:"workout",l:"Entreno",i:"🏋️"},{id:"cardio",l:"Cardio",i:"🏃"},{id:"progress",l:"Progreso",i:"📊"},{id:"history",l:"Historial",i:"📋"},{id:"settings",l:"Config",i:"⚙️"}];
  return <div style={S.tabBar}>{tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{...S.tab,...(active===t.id?S.tabA:{})}}><span style={{fontSize:18}}>{t.i}</span><span style={{fontSize:10,fontWeight:active===t.id?700:400}}>{t.l}</span></button>)}</div>;
}

function SettingsTab({apiKey,onApiKeyChange}){
  const[k,setK]=useState(apiKey);
  const[saved,setSaved]=useState(false);
  const doSave=()=>{onApiKeyChange(k);setSaved(true);setTimeout(()=>setSaved(false),2000)};
  return <div style={S.page}>
    <h2 style={S.st}>⚙️ Configuración</h2>
    <div style={S.card}>
      <h3 style={{fontSize:14,color:"#FF6B35",margin:"0 0 8px",fontFamily:"'Oswald',sans-serif"}}>API Key de Anthropic</h3>
      <p style={{fontSize:12,color:"#888",marginBottom:12,lineHeight:1.5}}>Para el Coach IA necesitás una API key. Se guarda solo en tu dispositivo. Conseguila en <a href="https://console.anthropic.com" target="_blank" rel="noopener" style={{color:"#FF6B35"}}>console.anthropic.com</a></p>
      <input type="password" value={k} onChange={e=>setK(e.target.value)} placeholder="sk-ant-api..." style={{...S.inp,marginBottom:12}}/>
      <button onClick={doSave} style={{...S.btn,width:"100%"}}>{saved?"✓ Guardada":"Guardar API Key"}</button>
    </div>
    <div style={{...S.card,marginTop:16}}>
      <h3 style={{fontSize:14,color:"#E74C3C",margin:"0 0 8px",fontFamily:"'Oswald',sans-serif"}}>Borrar todos los datos</h3>
      <p style={{fontSize:12,color:"#888",marginBottom:12}}>Elimina todo: sesiones, cardio y notas del coach.</p>
      <button onClick={()=>{if(window.confirm("¿Seguro? Se borrarán TODOS los datos.")){localStorage.removeItem(STORAGE_KEY);window.location.reload()}}} style={{...S.btn,width:"100%",background:"linear-gradient(135deg,#E74C3C,#C0392B)"}}>Borrar datos</button>
    </div>
  </div>;
}

function WorkoutTab({data,setData,apiKey}){
  const[ses,setSes]=useState(null);
  const[sg,setSg]=useState(null);
  const[showFb,setShowFb]=useState(false);
  const[fb,setFb]=useState("");
  const[aiRes,setAiRes]=useState("");
  const[aiLoad,setAiLoad]=useState(false);

  const start=()=>{setSes({id:gid(),date:td(),exercises:[],cardio:[]});setSg(null)};

  const addEx=(name,group)=>{
    const hist=data.sessions.flatMap(s=>s.exercises).filter(e=>e.name===name);
    const tg=tgt(hist);
    setSes(s=>({...s,exercises:[...s.exercises,{id:gid(),name,muscleGroup:group,sets:tg?Array.from({length:tg.targetSets},()=>({weight:tg.targetWeight,reps:tg.targetReps,done:false})):[{weight:0,reps:10,done:false}],targets:tg}]}));
    setSg(null);
  };

  const upSet=(eid,idx,f,v)=>setSes(s=>({...s,exercises:s.exercises.map(ex=>ex.id===eid?{...ex,sets:ex.sets.map((st,i)=>i===idx?{...st,[f]:f==="done"?v:Number(v)}:st)}:ex)}));
  const addSet=(eid)=>setSes(s=>({...s,exercises:s.exercises.map(ex=>ex.id===eid?{...ex,sets:[...ex.sets,{weight:ex.sets.at(-1)?.weight||0,reps:ex.sets.at(-1)?.reps||10,done:false}]}:ex)}));
  const rmSet=(eid,idx)=>setSes(s=>({...s,exercises:s.exercises.map(ex=>ex.id===eid?{...ex,sets:ex.sets.filter((_,i)=>i!==idx)}:ex)}));
  const rmEx=(eid)=>setSes(s=>({...s,exercises:s.exercises.filter(ex=>ex.id!==eid)}));

  const submit=async()=>{
    setAiLoad(true);
    const toSave={...ses,feedback:fb};
    const ns=[...data.sessions,toSave];
    const nd={...data,sessions:ns};
    if(apiKey){
      try{const txt=await callAI(coachPrompt(toSave,ns,fb),apiKey);setAiRes(txt);nd.coachNotes=[...nd.coachNotes,{sessionId:toSave.id,date:toSave.date,note:txt,feedback:fb}]}
      catch(e){setAiRes("Error: "+e.message+"\nSesión guardada igualmente.")}
    }else{setAiRes("Sin API key. Sesión guardada. Andá a Config para activar el Coach IA.")}
    setData(nd);sv(nd);setAiLoad(false);
  };

  const reset=()=>{setSes(null);setShowFb(false);setFb("");setAiRes("")};

  if(showFb)return <div style={S.page}>
    <h2 style={S.st}>📝 ¿Cómo estuvo la sesión?</h2>
    {!aiRes?<>
      <textarea value={fb} onChange={e=>setFb(e.target.value)} placeholder="Contá cómo te sentiste... ¿Pesado? ¿Fácil? ¿Dolor? ¿Descansaste bien?" style={S.ta} rows={5}/>
      <button onClick={submit} disabled={!fb.trim()||aiLoad} style={{...S.btn,opacity:!fb.trim()||aiLoad?0.5:1,width:"100%",marginTop:12}}>{aiLoad?"🔥 Analizando...":"Enviar al Coach IA"}</button>
    </>:
    <div style={S.ai}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:24}}>🧠</span><span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:"#FF6B35"}}>COACH FORJA</span></div>
      <p style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",color:"#E0E0E0"}}>{aiRes}</p>
      <button onClick={reset} style={{...S.btn,marginTop:16,width:"100%"}}>Cerrar sesión ✓</button>
    </div>}
  </div>;

  if(!ses){
    const last=data.sessions.at(-1);
    return <div style={S.page}>
      <div style={S.hero}>
        <span style={{fontSize:48}}>🔥</span>
        <h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,margin:"8px 0 4px"}}>¿Listo para forjar?</h2>
        <p style={{fontSize:13,color:"#AAA",margin:0}}>{last?`Última sesión: ${fd(last.date)}`:"Comenzá a registrar tus entrenamientos"}</p>
        <button onClick={start} style={{...S.btn,marginTop:16,width:"100%"}}>Iniciar sesión</button>
      </div>
      {data.coachNotes.length>0&&<div style={{marginTop:20}}><h3 style={S.st}>🧠 Última nota del Coach</h3><div style={S.ai}><p style={{fontSize:13,lineHeight:1.5,color:"#CCC",whiteSpace:"pre-wrap"}}>{data.coachNotes.at(-1).note}</p><p style={{fontSize:11,color:"#888",marginTop:8}}>{fd(data.coachNotes.at(-1).date)}</p></div></div>}
    </div>;
  }

  return <div style={S.page}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={S.st}>Sesión en curso</h2><span style={{fontSize:12,color:"#888"}}>{fd(ses.date)}</span>
    </div>
    {ses.exercises.map(ex=><div key={ex.id} style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{fontSize:12,color:MG[ex.muscleGroup]?.color,fontWeight:700}}>{MG[ex.muscleGroup]?.icon} {MG[ex.muscleGroup]?.label}</span><h3 style={{margin:"4px 0 0",fontSize:16,fontFamily:"'Oswald',sans-serif",color:"#FFF"}}>{ex.name}</h3></div>
        <button onClick={()=>rmEx(ex.id)} style={S.sm}>✕</button>
      </div>
      {ex.targets&&<div style={S.tb}>🎯 {ex.targets.suggestion}</div>}
      <div style={{marginTop:12}}>
        <div style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 40px 40px",gap:6,marginBottom:6}}>
          <span style={S.ch}>#</span><span style={S.ch}>Kg</span><span style={S.ch}>Reps</span><span style={S.ch}>✓</span><span></span>
        </div>
        {ex.sets.map((set,idx)=><div key={idx} style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 40px 40px",gap:6,alignItems:"center",marginBottom:4,opacity:set.done?0.6:1}}>
          <span style={{fontSize:13,color:"#888",textAlign:"center"}}>{idx+1}</span>
          <input type="number" value={set.weight} onChange={e=>upSet(ex.id,idx,"weight",e.target.value)} style={S.inp} step="0.5"/>
          <input type="number" value={set.reps} onChange={e=>upSet(ex.id,idx,"reps",e.target.value)} style={S.inp}/>
          <button onClick={()=>upSet(ex.id,idx,"done",!set.done)} style={{...S.chk,background:set.done?"#2ECC71":"rgba(255,255,255,0.05)",color:set.done?"#FFF":"#666"}}>✓</button>
          <button onClick={()=>rmSet(ex.id,idx)} style={S.sm}>−</button>
        </div>)}
        <button onClick={()=>addSet(ex.id)} style={S.as}>+ Serie</button>
      </div>
    </div>)}

    {!sg?<div>
      <h3 style={{...S.st,fontSize:14,marginTop:20}}>Agregar ejercicio</h3>
      <div style={S.mg}>{Object.entries(MG).map(([k,v])=><button key={k} onClick={()=>setSg(k)} style={S.mb}><span style={{fontSize:22}}>{v.icon}</span><span style={{fontSize:11,color:v.color,fontWeight:600}}>{v.label}</span></button>)}</div>
    </div>:
    <div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginTop:16,marginBottom:8}}><button onClick={()=>setSg(null)} style={S.sm}>←</button><h3 style={{fontSize:14,color:MG[sg].color,margin:0,fontFamily:"'Oswald',sans-serif"}}>{MG[sg].icon} {MG[sg].label}</h3></div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>{(EC[sg]||[]).map(n=><button key={n} onClick={()=>addEx(n,sg)} style={S.eo}>{n}</button>)}</div>
    </div>}

    {ses.exercises.length>0&&<button onClick={()=>setShowFb(true)} style={{...S.btn,marginTop:24,width:"100%"}}>Finalizar sesión 🔥</button>}
  </div>;
}

function CardioTab({data,setData}){
  const[adding,setAdding]=useState(false);
  const[type,setType]=useState("running");
  const[p,setP]=useState("");
  const[s2,setS2]=useState("");
  const[date,setDate]=useState(td());
  const[notes,setNotes]=useState("");
  const doSave=()=>{const nd={...data,cardioSessions:[...data.cardioSessions,{id:gid(),type,primary:Number(p),secondary:Number(s2),date,notes}]};setData(nd);sv(nd);setAdding(false);setP("");setS2("");setNotes("")};
  const del=(id)=>{const nd={...data,cardioSessions:data.cardioSessions.filter(c=>c.id!==id)};setData(nd);sv(nd)};

  if(adding){const ct=CT[type];return <div style={S.page}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><button onClick={()=>setAdding(false)} style={S.sm}>←</button><h2 style={S.st}>Registrar Cardio</h2></div>
    <label style={S.lbl}>Tipo</label>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:16}}>{Object.entries(CT).map(([k,v])=><button key={k} onClick={()=>setType(k)} style={{...S.mb,border:type===k?"2px solid #FF6B35":"1px solid rgba(255,255,255,0.08)",background:type===k?"rgba(255,107,53,0.15)":"rgba(255,255,255,0.03)"}}><span style={{fontSize:20}}>{v.icon}</span><span style={{fontSize:10}}>{v.label}</span></button>)}</div>
    <label style={S.lbl}>Fecha</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...S.inp,marginBottom:12}}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      <div><label style={S.lbl}>{ct.unit}</label><input type="number" value={p} onChange={e=>setP(e.target.value)} style={S.inp} placeholder="0" step="0.1"/></div>
      <div><label style={S.lbl}>{ct.su}</label><input type="number" value={s2} onChange={e=>setS2(e.target.value)} style={S.inp} placeholder="0"/></div>
    </div>
    <label style={S.lbl}>Notas</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} style={S.ta} rows={2}/>
    <button onClick={doSave} disabled={!p} style={{...S.btn,marginTop:12,width:"100%",opacity:p?1:0.5}}>Guardar</button>
  </div>}

  const sorted=[...data.cardioSessions].sort((a,b)=>b.date.localeCompare(a.date));
  return <div style={S.page}>
    <h2 style={S.st}>🏃 Cardio</h2>
    <button onClick={()=>setAdding(true)} style={{...S.btn,width:"100%",marginBottom:20}}>+ Registrar cardio</button>
    {sorted.length===0?<p style={{color:"#888",textAlign:"center",fontSize:14}}>Sin sesiones aún.</p>:sorted.map(c=>{const ct=CT[c.type];return <div key={c.id} style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between"}}><div><span style={{fontSize:20,marginRight:8}}>{ct?.icon}</span><span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,color:"#FFF"}}>{ct?.label}</span><p style={{fontSize:12,color:"#888",margin:"4px 0 0"}}>{fd(c.date)}</p></div><button onClick={()=>del(c.id)} style={S.sm}>✕</button></div>
      <div style={{display:"flex",gap:16,marginTop:8}}><span style={{fontSize:14,color:"#FF6B35",fontWeight:700}}>{c.primary} {ct?.unit}</span><span style={{fontSize:14,color:"#AAA"}}>{c.secondary} {ct?.su}</span></div>
      {c.notes&&<p style={{fontSize:12,color:"#999",marginTop:6,fontStyle:"italic"}}>{c.notes}</p>}
    </div>})}
  </div>;
}

function ProgressTab({data}){
  const[sg,setSg]=useState(null);
  const[se,setSe]=useState(null);
  const gs={};
  Object.keys(MG).forEach(g=>{gs[g]={sc:new Set(data.sessions.filter(s=>s.exercises.some(e=>e.muscleGroup===g)).map(s=>s.id)).size}});

  if(se&&sg){
    const hist=data.sessions.flatMap(s=>s.exercises.filter(e=>e.name===se).map(e=>({...e,date:s.date}))).sort((a,b)=>a.date.localeCompare(b.date));
    const cd=hist.map(h=>({date:h.date,mw:Math.max(...h.sets.map(s=>s.weight)),vol:h.sets.reduce((sum,s)=>sum+s.weight*s.reps,0)}));
    const pk=cd.length?Math.max(...cd.map(h=>h.mw)):0;
    return <div style={S.page}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><button onClick={()=>setSe(null)} style={S.sm}>←</button><h2 style={{...S.st,margin:0}}>{se}</h2></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <div style={S.sc}><span style={S.sv}>{pk}<span style={S.su}>kg</span></span><span style={S.sl}>Peso máximo</span></div>
        <div style={S.sc}><span style={S.sv}>{hist.length}</span><span style={S.sl}>Sesiones</span></div>
      </div>
      {cd.length>1&&<div style={S.card}><h4 style={{fontSize:13,color:"#888",margin:"0 0 12px",fontFamily:"'Oswald',sans-serif"}}>PROGRESIÓN DE PESO</h4><div style={{display:"flex",alignItems:"flex-end",gap:4,height:120}}>{cd.map((h,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:10,color:"#AAA"}}>{h.mw}</span><div style={{width:"100%",height:`${pk>0?(h.mw/pk)*100:10}%`,minHeight:4,background:"linear-gradient(180deg,#FF6B35,#D62828)",borderRadius:4}}/><span style={{fontSize:8,color:"#666"}}>{h.date.slice(5)}</span></div>)}</div></div>}
      {hist.map((h,i)=><div key={i} style={{...S.card,padding:12}}><div style={{fontSize:12,color:"#888",marginBottom:6}}>{fd(h.date)}</div>{h.sets.map((s,j)=><div key={j} style={{fontSize:13,color:"#CCC",display:"flex",gap:8}}><span style={{color:"#888",width:28}}>S{j+1}</span><span style={{color:"#FF6B35",fontWeight:700,width:50}}>{s.weight}kg</span><span>× {s.reps}</span></div>)}</div>)}
    </div>;
  }
  if(sg){
    const names=[...new Set(data.sessions.flatMap(s=>s.exercises.filter(e=>e.muscleGroup===sg).map(e=>e.name)))];
    return <div style={S.page}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><button onClick={()=>setSg(null)} style={S.sm}>←</button><h2 style={{...S.st,margin:0,color:MG[sg].color}}>{MG[sg].icon} {MG[sg].label}</h2></div>
      {names.length===0?<p style={{color:"#888",textAlign:"center"}}>Sin ejercicios.</p>:names.map(n=>{const h=data.sessions.flatMap(s=>s.exercises.filter(e=>e.name===n));const mw=Math.max(...h.flatMap(x=>x.sets.map(s=>s.weight)),0);return <button key={n} onClick={()=>setSe(n)} style={S.eo}><span>{n}</span><span style={{color:"#FF6B35",fontSize:13,fontWeight:700}}>{mw}kg · {h.length} ses.</span></button>})}
    </div>;
  }
  const ts=data.sessions.length;
  const tv=data.sessions.reduce((sum,s)=>sum+s.exercises.reduce((s2,ex)=>s2+ex.sets.reduce((s3,st)=>s3+st.weight*st.reps,0),0),0);
  return <div style={S.page}>
    <h2 style={S.st}>📊 Progreso</h2>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
      <div style={S.sc}><span style={S.sv}>{ts}</span><span style={S.sl}>Sesiones</span></div>
      <div style={S.sc}><span style={S.sv}>{(tv/1000).toFixed(1)}<span style={S.su}>t</span></span><span style={S.sl}>Volumen total</span></div>
    </div>
    <h3 style={{...S.st,fontSize:14}}>Grupos musculares</h3>
    <div style={S.mg}>{Object.entries(MG).map(([k,v])=><button key={k} onClick={()=>setSg(k)} style={S.mb}><span style={{fontSize:22}}>{v.icon}</span><span style={{fontSize:11,color:v.color,fontWeight:600}}>{v.label}</span><span style={{fontSize:10,color:"#888"}}>{gs[k]?.sc||0} ses.</span></button>)}</div>
  </div>;
}

function HistoryTab({data,setData}){
  const sorted=[...data.sessions].sort((a,b)=>b.date.localeCompare(a.date));
  const del=(id)=>{const nd={...data,sessions:data.sessions.filter(s=>s.id!==id),coachNotes:data.coachNotes.filter(n=>n.sessionId!==id)};setData(nd);sv(nd)};
  return <div style={S.page}>
    <h2 style={S.st}>📋 Historial</h2>
    {sorted.length===0?<p style={{color:"#888",textAlign:"center"}}>Sin sesiones.</p>:sorted.map(ses=>{
      const grps=[...new Set(ses.exercises.map(e=>e.muscleGroup))];
      const vol=ses.exercises.reduce((sum,ex)=>sum+ex.sets.reduce((s,st)=>s+st.weight*st.reps,0),0);
      const note=data.coachNotes.find(n=>n.sessionId===ses.id);
      return <div key={ses.id} style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between"}}>
          <div><div style={{fontSize:12,color:"#888"}}>{fd(ses.date)}</div><div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>{grps.map(g=><span key={g} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:`${MG[g]?.color}22`,color:MG[g]?.color,fontWeight:600}}>{MG[g]?.label}</span>)}</div></div>
          <button onClick={()=>del(ses.id)} style={S.sm}>✕</button>
        </div>
        <div style={{marginTop:8,fontSize:13,color:"#AAA"}}>{ses.exercises.length} ejercicios · {vol.toLocaleString()} kg</div>
        {ses.exercises.map(ex=><div key={ex.id} style={{marginTop:6,paddingLeft:8,borderLeft:`2px solid ${MG[ex.muscleGroup]?.color}44`}}><div style={{fontSize:13,color:"#DDD",fontWeight:600}}>{ex.name}</div><div style={{fontSize:12,color:"#888"}}>{ex.sets.map(s=>`${s.weight}kg×${s.reps}`).join(" | ")}</div></div>)}
        {ses.feedback&&<div style={{marginTop:8,padding:8,background:"rgba(255,255,255,0.03)",borderRadius:8}}><div style={{fontSize:11,color:"#888"}}>💬 Tu comentario:</div><div style={{fontSize:12,color:"#BBB",fontStyle:"italic"}}>{ses.feedback}</div></div>}
        {note&&<div style={{marginTop:8,padding:8,background:"rgba(255,107,53,0.08)",borderRadius:8,borderLeft:"3px solid #FF6B35"}}><div style={{fontSize:11,color:"#FF6B35"}}>🧠 Coach:</div><div style={{fontSize:12,color:"#CCC",whiteSpace:"pre-wrap"}}>{note.note}</div></div>}
      </div>;
    })}
  </div>;
}

function App(){
  const[data,setData]=useState(EMPTY);
  const[tab,setTab]=useState("workout");
  const[loading,setLoading]=useState(true);
  const[apiKey,setApiKeyState]=useState("");

  useEffect(()=>{const d=ld();if(d)setData(d);setApiKeyState(gk());setLoading(false)},[]);
  const handleKey=(k)=>{setApiKeyState(k);sk(k)};

  if(loading)return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#0A0A0B"}}><Logo size={64}/><h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:28,color:"#FFF",margin:"16px 0 0"}}>FORJA</h1><p style={{color:"#888",fontSize:13}}>Cargando...</p></div>;

  return <div style={S.app}>
    <div style={S.header}><div style={{display:"flex",alignItems:"center",gap:10}}><Logo size={32}/><span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,letterSpacing:3,color:"#FFF"}}>FORJA</span></div><span style={{fontSize:10,color:"#666",fontFamily:"'Oswald',sans-serif",letterSpacing:2}}>ENTRENÁ CON CIENCIA</span></div>
    <div style={S.content}>
      {tab==="workout"&&<WorkoutTab data={data} setData={setData} apiKey={apiKey}/>}
      {tab==="cardio"&&<CardioTab data={data} setData={setData}/>}
      {tab==="progress"&&<ProgressTab data={data}/>}
      {tab==="history"&&<HistoryTab data={data} setData={setData}/>}
      {tab==="settings"&&<SettingsTab apiKey={apiKey} onApiKeyChange={handleKey}/>}
    </div>
    <TabBar active={tab} onChange={setTab}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
