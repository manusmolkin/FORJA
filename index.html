  {id:"desayuno",l:"Desayuno",i:"☀️"},

function tgt(hist){
  if(!hist?.length)return null;
  const last=hist.at(-1),sets=last.sets||[];
  if(!sets.length)return null;
  const avg=sets.reduce((s,x)=>s+x.reps,0)/sets.length,mw=Math.max(...sets.map(s=>s.weight));
  let tw=mw,tr=Math.round(avg),ts=sets.length,sug="";
  if(avg>=12){tw=Math.ceil((mw*1.025)/0.5)*0.5;tr=8;sug="Subir peso a "+tw+"kg. Apuntar a 8 reps."}
  else if(avg>=8){tr=Math.round(avg)+1;sug="Mantener "+mw+"kg. Apuntar a "+tr+" reps."}
  else if(avg>=6){if(sets.length<5){ts=sets.length+1;sug="Mantener "+mw+"kg x "+Math.round(avg)+" reps. +1 serie ("+ts+")."}else{tr=Math.round(avg)+1;sug="Mantener "+mw+"kg. Intentar "+tr+" reps."}}
  else{tw=Math.floor((mw*0.95)/0.5)*0.5;tr=8;sug="Reducir a "+tw+"kg para 8 reps con tecnica."}
  return{targetWeight:tw,targetReps:tr,targetSets:ts,suggestion:sug};
}

function buildPrompt(ses,all,fb,meals){
  const exd=ses.exercises.map(ex=>{const ss=ex.sets.map((s,i)=>"  S"+(i+1)+": "+s.weight+"kg x "+s.reps).join("\n");return ex.name+" ("+MG[ex.muscleGroup]?.l+"):\n"+ss}).join("\n\n");
  const recent=all.slice(-5).map(s=>fd(s.date)+": "+[...new Set(s.exercises.map(e=>MG[e.muscleGroup]?.l))].join(", ")).join("\n");
  const todayMeals=(meals||[]).filter(m=>m.date===ses.date);
  const nutCtx=todayMeals.length>0?"Alimentacion del dia:\n"+todayMeals.map(m=>{let txt=MEAL_TYPES.find(t=>t.id===m.type)?.l+": "+m.food;if(m.kcal)txt+=" ("+m.kcal+"kcal";if(m.protein)txt+=", "+m.protein+"g prot";if(m.carbs)txt+=", "+m.carbs+"g carb";if(m.fat)txt+=", "+m.fat+"g grasa";if(m.kcal||m.protein)txt+=")";return txt}).join("\n"):"";
  return "Sos un coach de fuerza e hipertrofia basado en evidencia (ACSM, NSCA, Schoenfeld).\nSesion completada:\nFecha: "+fd(ses.date)+"\nEjercicios:\n"+exd+"\nRecientes:\n"+recent+"\n"+(nutCtx?nutCtx+"\n":"")+"\nComentario: \""+fb+"\"\n\nEl usuario viene de varios meses sin entrenar y esta en fase de readaptacion/retorno.\nResponde en espanol, conciso (max 220 palabras). Evalua:\n1. Volumen e intensidad (son adecuados para su nivel actual?)\n2. Recomendaciones concretas para la proxima sesion\n3. Si deberia mantenerse en la fase actual o avanzar a la siguiente\n4. Frecuencia y recuperacion\n"+(nutCtx?"5. Comentario breve sobre la alimentacion del dia en relacion al entreno\n":"")+"Se directo y practico.";
}

async function callAI(prompt,key){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.map(c=>c.text||"").join("")||"Sin respuesta.";
}

function HealthTab({data,setData,apiKey}){

  const[studyVals,setStudyVals]=useState({});
  const[studyText,setStudyText]=useState("");
  const[selPanel,setSelPanel]=useState(null);
  const[selStudy,setSelStudy]=useState(null);
  const[aiRes,setAiRes]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[timelineMarker,setTimelineMarker]=useState(null);
  // Anthropometry state
  const[anthroAdding,setAnthroAdding]=useState(false);
  const[anthroVals,setAnthroVals]=useState({});
  const[anthroDate,setAnthroDate]=useState(td());
  const[selAnthroMetric,setSelAnthroMetric]=useState(null);
  // Upload + extraction state
  const[uploadFile,setUploadFile]=useState(null);       // File object
  const[uploadB64,setUploadB64]=useState(null);         // base64 string
  const[uploadMime,setUploadMime]=useState(null);       // mime type
  const[extracting,setExtracting]=useState(false);
  const[extracted,setExtracted]=useState(null);         // {raw, structured} from LLM
  const[uploadStep,setUploadStep]=useState("idle");     // idle | preview | extracting | review | done

  const studies=data.clinicalStudies||[];
  const stInfo=st=>STUDY_TYPES.find(x=>x.id===st)||STUDY_TYPES[8];

  const resetAdd=()=>{setStep(1);setStudyType(null);setStudyDate(td());setStudyTitle("");setStudyVals({});setStudyText("");setSelPanel(null);setUploadFile(null);setUploadB64(null);setUploadMime(null);setExtracted(null);setUploadStep("idle");};

  // Convert file to base64
  const fileToB64=(file)=>new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});

  // Detect mime from file
  const getMime=(file)=>{
    if(file.type)return file.type;
    if(file.name.endsWith(".pdf"))return "application/pdf";
    if(file.name.match(/\.(jpg|jpeg)$/i))return "image/jpeg";
    if(file.name.match(/\.png$/i))return "image/png";
    return "image/jpeg";
  };

  // Extract structured data from uploaded file via Claude vision/docs
  const doExtract=async(b64,mime,studyTypeId)=>{
    if(!apiKey){alert("Necesitás API key en Config.");return;}
    setExtracting(true);setUploadStep("extracting");
    const st=stInfo(studyTypeId);
    const extractPrompt=`Sos un médico especialista en interpretación de estudios clínicos. Se te proporciona la imagen o PDF de un estudio médico del tipo: ${st.l}.

Tu tarea es extraer TODOS los datos del documento. Respondé EXCLUSIVAMENTE con JSON válido, sin markdown:
{
  "studyType": "${studyTypeId}",
  "detectedTitle": "título del estudio",
  "detectedDate": "YYYY-MM-DD o null",
  "institution": "laboratorio/institución si aparece o null",
  "requestedBy": "médico solicitante si aparece o null",
  "values": [{"label":"nombre parámetro","value":"valor","unit":"unidad","reference":"rango referencia si aparece","status":"normal|alto|bajo|positivo|negativo|alterado|pendiente"}],
  "findings": "hallazgos narrativos si es un informe (endoscopía, eco, rx, PSG, etc.) o null",
  "conclusions": "conclusión o diagnóstico del informe o null",
  "recommendations": "recomendaciones del médico si las hay o null",
  "rawText": "texto más relevante del documento transcripto fielmente"
}
Si un valor es ilegible ponelo como "ilegible". Solo JSON, sin texto adicional.`;
    try{
      const isPdf=mime==="application/pdf";
      const contentBlock=isPdf
        ?{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}}
        :{type:"image",source:{type:"base64",media_type:mime,data:b64}};
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,messages:[{role:"user",content:[contentBlock,{type:"text",text:extractPrompt}]}]})});
      const d=await r.json();
      if(d.error)throw new Error(d.error.message);
      const txt=d.content?.map(c=>c.text||"").join("")||"{}";
      const clean=txt.replace(/```json[\s\S]*?```|```/g,"").trim();
      const parsed=JSON.parse(clean);
      setExtracted(parsed);
      if(parsed.detectedDate&&parsed.detectedDate!=="null")setStudyDate(parsed.detectedDate);
      if(parsed.detectedTitle&&parsed.detectedTitle!=="null")setStudyTitle(parsed.detectedTitle);
      let autoText="";
      if(parsed.findings&&parsed.findings!=="null")autoText+=parsed.findings+"\n\n";
      if(parsed.conclusions&&parsed.conclusions!=="null")autoText+="Conclusión: "+parsed.conclusions+"\n";
      if(parsed.recommendations&&parsed.recommendations!=="null")autoText+="\nRecomendaciones: "+parsed.recommendations;
      if(autoText)setStudyText(autoText.trim());
      if(parsed.values?.length){
        const nv={};
        const allFields=[...URINE_FIELDS,...SPIROMETRY_FIELDS,...SLEEP_FIELDS,...DIGESTIVE_FIELDS];
        BLOOD_PANELS.forEach(p=>p.fields.forEach(f=>allFields.push(f)));
        parsed.values.forEach(v=>{
          const lbl=(v.label||"").toLowerCase();
          const match=allFields.find(f=>lbl.includes(f.l.toLowerCase().slice(0,5))||f.l.toLowerCase().includes(lbl.slice(0,5)));
          if(match&&v.value&&v.value!=="ilegible"&&v.value!=="null")nv[match.id]=v.value;
        });
        if(Object.keys(nv).length)setStudyVals(nv);
      }
      setUploadStep("review");
    }catch(e){setExtracted({error:e.message});setUploadStep("review");}
    setExtracting(false);
  };

  const doSave=()=>{
    const st=stInfo(studyType);
    const study={
      id:gi(),date:studyDate,type:studyType,

---

INSTRUCCIONES DE ANÁLISIS:

1. EVALUACIÓN DE VALORES: Para cada valor registrado, evaluá si está dentro del rango óptimo según las guías más recientes de la sociedad médica más relevante para ese marcador. Indicá claramente cuáles están FUERA de rango con ↑ o ↓, cuáles están en zona de alerta (aunque dentro de rango "normal"), y cuáles son óptimos. Para marcadores con rangos sexo-dependientes o edad-dependientes, aplicá los correctos.

2. INTERACCIONES ENTRE MARCADORES: Si hay múltiples marcadores, analizá las relaciones entre ellos (ej: LDL + HDL + TG + PCR-us juntos dicen más que cada uno por separado; ferritina baja con RDW alto sugiere inicio de ferropenia funcional).

3. TENDENCIAS Y EVOLUCIÓN: Si hay estudios anteriores, analizá la trayectoria temporal. ¿Los valores van mejorando, empeorando o estables? ¿Hay cambios que coincidan con el inicio del entrenamiento o cambios de dieta?

4. CONTEXTO DEPORTE + NUTRICIÓN: Considerá que el paciente entrena fuerza con progresión, es pescatariano/plant-based. ¿El ejercicio puede estar influyendo en estos valores? ¿La dieta puede causar o prevenir algo de lo que se ve? (ej: si hay ferritina baja y es plant-based → riesgo real; si hay creatinina levemente elevada y tiene mucha masa muscular → puede ser fisiológico).

5. RECOMENDACIONES CLÍNICAS CONCRETAS: Sé específico: "Repetir perfil lipídico en 3 meses", "Consultar endocrinólogo por TSH > 4 con síntomas", "Agregar vitamina D 2000 UI/día y controlar en 3 meses", "No requiere acción, seguir con control anual". Priorizá por urgencia.

6. SEMÁFORO GLOBAL AL INICIO DE LA RESPUESTA:
   🟢 Todo en orden — seguir con controles de rutina
   🟡 Valores a monitorear — acciones preventivas sugeridas
   🔴 Requiere atención médica — derivación o intervención recomendada

Respondé en español. Comenzá con el semáforo. Sé técnico pero accesible. Directo y clínico. Máximo 450 palabras. No alarmes innecesariamente, pero no minimices hallazgos relevantes. Citá la guía cuando sea pertinente (ej: "según ACC/AHA 2023...").`;
  };

  const doAnalyze=async(study)=>{
    if(!apiKey){alert("Necesitás API key en Config.");return;}
    setAiLoad(true);setAiRes("");
    try{
      const prompt=buildClinicalPrompt(study);
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:prompt}]})});
      const d=await r.json();if(d.error)throw new Error(d.error.message);
      const txt=d.content?.map(c=>c.text||"").join("")||"Sin respuesta.";
      // Save analysis to study
      const nd={...data,clinicalStudies:studies.map(s=>s.id===study.id?{...s,lastAnalysis:{text:txt,date:td()}}:s)};
      setData(nd);sv(nd);
      setAiRes(txt);
    }catch(e){setAiRes("Error: "+e.message);}
    setAiLoad(false);
  };

  // ── Timeline view: track a specific blood marker over time ──
  const getBloodHistory=(markerId)=>{
    return studies
      .filter(s=>s.type==="blood"&&s.vals[markerId]!==undefined&&s.vals[markerId]!=="")
      .sort((a,b)=>a.date.localeCompare(b.date))
      .map(s=>({date:s.date,val:parseFloat(s.vals[markerId])}))
      .filter(x=>!isNaN(x.val));
  };

  const allBloodMarkers=()=>{
    const markers=new Set();
    studies.filter(s=>s.type==="blood").forEach(s=>{
      Object.keys(s.vals).forEach(k=>{if(s.vals[k]!=="")markers.add(k);});
    });
    return [...markers];
  };

  // ── VIEW: ADD STUDY ──
  if(view==="add"){
    // Step 1: choose type
    if(step===1)return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>{resetAdd();setView("home");}} style={S.sm}>&#8592;</button>
        <h2 style={S.t1}>Nuevo estudio</h2>
      </div>
      <p style={{fontSize:13,color:"#888",marginBottom:14}}>¿Qué tipo de estudio querés cargar?</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {STUDY_TYPES.map(st=><button key={st.id} onClick={()=>{setStudyType(st.id);setStep(2);}} style={{...S.eo,borderLeft:"3px solid "+st.color}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:22}}>{st.i}</span>
            <span style={{fontSize:15,color:"#FFF",fontWeight:600}}>{st.l}</span>
          </div>
          <span style={{color:st.color,fontSize:18}}>&#8594;</span>
        </button>)}
      </div>
    </div>;

    // Step 2: upload or manual entry
    const st=stInfo(studyType);
    const isFreeText=FREE_TEXT_STUDIES.includes(studyType);
    const getFields=()=>{
      if(studyType==="blood")return null;
      if(studyType==="urine")return URINE_FIELDS;
      if(studyType==="spirometry")return SPIROMETRY_FIELDS;
      if(studyType==="sleep")return SLEEP_FIELDS;
      if(studyType==="digestive")return DIGESTIVE_FIELDS;
      return null;
    };
    const fields=getFields();
    const hasData=Object.keys(studyVals).length>0||studyText.trim().length>0;

    // ── UPLOAD STEP: idle — show upload zone + manual option ──
    if(uploadStep==="idle")return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>setStep(1)} style={S.sm}>&#8592;</button>
        <span style={{fontSize:20}}>{st.i}</span>
        <h2 style={{...S.t1,margin:0}}>{st.l}</h2>
      </div>
      {/* Upload zone */}
      <div style={{border:"2px dashed rgba(255,107,53,0.4)",borderRadius:16,padding:"28px 20px",textAlign:"center",marginBottom:16,background:"rgba(255,107,53,0.04)",cursor:"pointer",position:"relative"}}
        onClick={()=>document.getElementById("file-upload-input").click()}
        onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="rgba(255,107,53,0.9)";}}
        onDragLeave={e=>{e.currentTarget.style.borderColor="rgba(255,107,53,0.4)";}}
        onDrop={async e=>{
          e.preventDefault();e.currentTarget.style.borderColor="rgba(255,107,53,0.4)";
          const f=e.dataTransfer.files[0];if(!f)return;
          const mime=getMime(f);setUploadFile(f);setUploadMime(mime);
          const b64=await fileToB64(f);setUploadB64(b64);setUploadStep("preview");
        }}>
        <input id="file-upload-input" type="file" accept=".pdf,image/*" style={{display:"none"}} onChange={async e=>{
          const f=e.target.files[0];if(!f)return;
          const mime=getMime(f);setUploadFile(f);setUploadMime(mime);
          const b64=await fileToB64(f);setUploadB64(b64);setUploadStep("preview");
        }}/>
        <div style={{fontSize:40,marginBottom:8}}>📎</div>
        <div style={{fontSize:15,color:"#FFF",fontWeight:600,marginBottom:4}}>Adjuntar estudio</div>
        <div style={{fontSize:12,color:"#888"}}>PDF o imagen · arrastrá o tocá para elegir</div>
        <div style={{fontSize:11,color:"#FF6B35",marginTop:8}}>El LLM extrae los datos, los muestra y analiza automáticamente</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"0 0 16px"}}>
        <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
        <span style={{fontSize:11,color:"#666"}}>o cargá manualmente</span>
        <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)"}}/>
      </div>
      <button onClick={()=>setUploadStep("review")} style={{...S.eo,justifyContent:"center",color:"#AAA",fontSize:13}}>✏️ Ingresar datos manualmente</button>
    </div>;

    // ── UPLOAD STEP: preview — show file info, confirm extraction ──
    if(uploadStep==="preview")return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>setUploadStep("idle")} style={S.sm}>&#8592;</button>
        <h2 style={S.t1}>Archivo adjunto</h2>
      </div>
      <div style={{...S.cd,borderLeft:"3px solid #FF6B35",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:28}}>{uploadMime==="application/pdf"?"📄":"🖼️"}</span>
          <div>
            <div style={{fontSize:14,color:"#FFF",fontWeight:600}}>{uploadFile?.name}</div>
            <div style={{fontSize:11,color:"#888"}}>{uploadMime} · {uploadFile?(uploadFile.size/1024).toFixed(0)+" KB":""}</div>
          </div>
        </div>
      </div>
      {uploadMime&&uploadMime.startsWith("image/")&&uploadB64&&
        <img src={`data:${uploadMime};base64,${uploadB64}`} style={{width:"100%",borderRadius:12,marginBottom:16,maxHeight:260,objectFit:"contain",background:"rgba(255,255,255,0.03)"}} alt="preview"/>}
      <button onClick={()=>doExtract(uploadB64,uploadMime,studyType)}
        style={{...S.btn,width:"100%",marginBottom:10}}>
        🧠 Extraer y analizar con IA
      </button>
      <button onClick={()=>setUploadStep("review")} style={{...S.eo,justifyContent:"center",color:"#888",fontSize:13}}>Completar manualmente sin leer el archivo</button>
    </div>;

    // ── UPLOAD STEP: extracting ──
    if(uploadStep==="extracting")return <div style={S.pg}>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,gap:16}}>
        <div style={{fontSize:48}}>🔬</div>
        <div style={{fontFamily:"'Oswald',sans-serif",fontSize:18,color:"#FF6B35",fontWeight:700}}>Leyendo el estudio…</div>
        <div style={{fontSize:13,color:"#888",textAlign:"center",lineHeight:1.6}}>El médico IA está extrayendo todos los valores,<br/>hallazgos y datos del documento.</div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#FF6B35",animation:`pulse ${0.8+i*0.2}s ease-in-out infinite alternate`,opacity:0.4+i*0.3}}/>)}
        </div>
      </div>
      <style>{`@keyframes pulse{from{transform:scale(1);opacity:0.4}to{transform:scale(1.4);opacity:1}}`}</style>
    </div>;

    // ── UPLOAD STEP: review — show extracted data + allow editing + save ──
    // This is the main data entry form, pre-filled if extraction happened
    return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <button onClick={()=>uploadFile?setUploadStep("preview"):setStep(1)} style={S.sm}>&#8592;</button>
        <span style={{fontSize:20}}>{st.i}</span>
        <h2 style={{...S.t1,margin:0,flex:1}}>{st.l}</h2>
      </div>

      {/* Extraction summary banner */}
      {extracted&&!extracted.error&&<div style={{...S.cd,borderLeft:"3px solid #2ECC71",background:"rgba(46,204,113,0.06)",marginBottom:14}}>
        <div style={{fontSize:11,color:"#2ECC71",fontFamily:"'Oswald',sans-serif",letterSpacing:1,marginBottom:6}}>✅ EXTRACCIÓN COMPLETADA</div>
        {extracted.institution&&<div style={{fontSize:12,color:"#CCC",marginBottom:2}}>🏥 {extracted.institution}</div>}
        {extracted.requestedBy&&<div style={{fontSize:12,color:"#CCC",marginBottom:2}}>👨‍⚕️ Solicitado por: {extracted.requestedBy}</div>}
        <div style={{fontSize:11,color:"#888",marginTop:4}}>{extracted.values?.length||0} valores detectados · Revisá y guardá</div>
      </div>}
      {extracted?.error&&<div style={{...S.cd,borderLeft:"3px solid #E74C3C",marginBottom:14}}>
        <div style={{fontSize:12,color:"#E74C3C"}}>⚠️ Error en extracción: {extracted.error}</div>
        <div style={{fontSize:11,color:"#888",marginTop:4}}>Completá los datos manualmente.</div>
      </div>}

      {/* Extracted values display — beautiful card view */}
      {extracted?.values?.length>0&&<div style={{...S.cd,marginBottom:14}}>
        <div style={{fontSize:11,color:"#FF6B35",fontFamily:"'Oswald',sans-serif",letterSpacing:1,marginBottom:10}}>VALORES DETECTADOS</div>
        {extracted.values.map((v,i)=>{
          const statusColor=v.status==="normal"?"#2ECC71":v.status==="alto"||v.status==="positivo"||v.status==="alterado"?"#E74C3C":v.status==="bajo"?"#F39C12":"#888";
          const statusIcon=v.status==="normal"?"✓":v.status==="alto"?"↑":v.status==="bajo"?"↓":v.status==="positivo"?"⚠":v.status==="negativo"?"✓":"·";
          return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{flex:1}}>
              <span style={{fontSize:12,color:"#CCC"}}>{v.label}</span>
              {v.reference&&<span style={{fontSize:10,color:"#555",marginLeft:6}}>({v.reference})</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:14,color:statusColor,fontWeight:700}}>{v.value}</span>
              {v.unit&&<span style={{fontSize:11,color:"#666"}}>{v.unit}</span>}
              <span style={{fontSize:12,color:statusColor,fontWeight:700,width:14,textAlign:"center"}}>{statusIcon}</span>
            </div>
          </div>;
        })}
      </div>}

      <label style={S.lbl}>Fecha del estudio</label>
      <input type="date" value={studyDate} onChange={e=>setStudyDate(e.target.value)} style={{...S.inp,marginBottom:12}}/>
      <label style={S.lbl}>Título <span style={{fontWeight:400,color:"#666",textTransform:"none",letterSpacing:0}}>(opcional)</span></label>
      <input value={studyTitle} onChange={e=>setStudyTitle(e.target.value)} placeholder={st.l} style={{...S.inp,marginBottom:16}}/>

      {/* BLOOD panels */}
      {studyType==="blood"&&<div>
        <p style={{fontSize:12,color:"#888",marginBottom:10}}>
          {extracted?"Valores auto-completados desde el archivo. Revisá y ajustá si hace falta.":"Completá los paneles disponibles en tu analítica."}
        </p>
        {BLOOD_PANELS.map(panel=>{
          const open=selPanel===panel.id;
          const filled=panel.fields.filter(f=>studyVals[f.id]!==undefined&&studyVals[f.id]!=="").length;
          return <div key={panel.id} style={{marginBottom:8}}>
            <button onClick={()=>setSelPanel(open?null:panel.id)} style={{...S.eo,borderLeft:"3px solid "+(filled>0?"#2ECC71":"rgba(255,255,255,0.1)"),marginBottom:0}}>
              <div><span style={{fontWeight:700,color:"#FFF"}}>{panel.l}</span>
                {filled>0&&<span style={{fontSize:11,color:"#2ECC71",marginLeft:8}}>{filled} valor{filled>1?"es":""}</span>}
              </div>
              <span style={{fontSize:12,color:"#888"}}>{open?"▲":"▼"}</span>
            </button>
            {open&&<div style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderTop:"none",borderRadius:"0 0 10px 10px",padding:"12px 14px"}}>
              {panel.fields.map(f=><div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:studyVals[f.id]?"#FFF":"#CCC"}}>{f.l}</div>
                  <div style={{fontSize:10,color:"#555"}}>{f.ref}</div>
                </div>
                <input type="text" value={studyVals[f.id]||""} onChange={e=>{const nv={...studyVals};if(e.target.value)nv[f.id]=e.target.value;else delete nv[f.id];setStudyVals(nv);}} style={{...S.inp,width:90,textAlign:"right",borderColor:studyVals[f.id]?"rgba(46,204,113,0.3)":"rgba(255,255,255,0.1)"}} placeholder="-"/>
                {f.u&&<span style={{fontSize:11,color:"#666",width:50,flexShrink:0}}>{f.u}</span>}
              </div>)}
            </div>}
          </div>;
        })}
      </div>}

      {/* Structured fields (urine/spirometry/sleep/digestive) */}
      {fields&&<div>
        <p style={{fontSize:12,color:"#888",marginBottom:10}}>{extracted?"Auto-completado desde archivo. Revisá.":"Completá los valores disponibles."}</p>
        {fields.map(f=><div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:studyVals[f.id]?"#FFF":"#CCC"}}>{f.l}</div>
            {f.ref&&<div style={{fontSize:10,color:"#555"}}>ref: {f.ref}</div>}
          </div>
          <input type="text" value={studyVals[f.id]||""} onChange={e=>{const nv={...studyVals};if(e.target.value)nv[f.id]=e.target.value;else delete nv[f.id];setStudyVals(nv);}} style={{...S.inp,width:90,textAlign:"right",borderColor:studyVals[f.id]?"rgba(46,204,113,0.3)":"rgba(255,255,255,0.1)"}} placeholder="-"/>
          {f.u&&<span style={{fontSize:11,color:"#666",width:50,flexShrink:0}}>{f.u}</span>}
        </div>)}
      </div>}

      {/* Findings/conclusions/free text */}
      <div style={{marginTop:16}}>
        <label style={S.lbl}>
          {isFreeText?"Hallazgos / informe":"Observaciones adicionales"}
          {!isFreeText&&<span style={{fontWeight:400,color:"#666",textTransform:"none",letterSpacing:0}}> (opcional)</span>}
        </label>
        <textarea value={studyText} onChange={e=>setStudyText(e.target.value)}
          placeholder={extracted?"Extraído del documento. Podés editar.":(isFreeText?"Hallazgos principales, conclusiones del médico...":"Notas adicionales...")}
          style={{...S.ta,minHeight:isFreeText?140:80}}/>
      </div>

      <button onClick={doSave} disabled={!hasData}
        style={{...S.btn,width:"100%",marginTop:16,opacity:hasData?1:0.4}}>
        💾 Guardar estudio
      </button>
      {extracted&&<button onClick={()=>{
        // Save and immediately analyze
        const study2={id:gi(),date:studyDate,type:studyType,title:studyTitle||st.l,vals:studyVals,text:studyText||null,extractedData:extracted};
        const nd={...data,clinicalStudies:[...studies,study2]};
        setData(nd);sv(nd);resetAdd();setView("home");
        setTimeout(()=>{setSelStudy({...study2});setView("study");},50);
      }} style={{...S.btn,width:"100%",marginTop:8,background:"linear-gradient(135deg,#1ABC9C,#16A085)"}}>
        🧠 Guardar y analizar con IA ahora
      </button>}
    </div>;
  }

  // ── VIEW: STUDY DETAIL + ANALYSIS ──
  if(view==="study"&&selStudy){
    const st=stInfo(selStudy.type);
    const analysis=selStudy.lastAnalysis;
    const ext=selStudy.extractedData;

    const renderVals=()=>{
      if(!selStudy.vals||Object.keys(selStudy.vals).length===0)return null;
      const stColor=st.color||"#FF6B35";
      if(selStudy.type==="blood")return BLOOD_PANELS.map(panel=>{
        const entries=panel.fields.filter(f=>selStudy.vals[f.id]!==undefined&&selStudy.vals[f.id]!=="");
        if(!entries.length)return null;
        return <div key={panel.id} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:stColor,fontFamily:"'Oswald',sans-serif",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{panel.l}</div>
          {entries.map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
            <span style={{fontSize:12,color:"#AAA"}}>{f.l}</span>
            <div style={{textAlign:"right"}}>
              <span style={{fontSize:14,color:"#FFF",fontWeight:700}}>{selStudy.vals[f.id]}</span>
              {f.u&&<span style={{fontSize:11,color:"#666",marginLeft:4}}>{f.u}</span>}
            </div>
          </div>)}
        </div>;
      });
      const getViewFields=()=>{
        if(selStudy.type==="urine")return URINE_FIELDS;
        if(selStudy.type==="spirometry")return SPIROMETRY_FIELDS;
        if(selStudy.type==="sleep")return SLEEP_FIELDS;
        if(selStudy.type==="digestive")return DIGESTIVE_FIELDS;
        return [];
      };
      const vf=getViewFields().filter(f=>selStudy.vals[f.id]!==undefined&&selStudy.vals[f.id]!=="");
      if(!vf.length)return null;
      return vf.map(f=><div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <span style={{fontSize:12,color:"#AAA"}}>{f.l}</span>
        <div style={{textAlign:"right"}}>
          <span style={{fontSize:14,color:"#FFF",fontWeight:700}}>{selStudy.vals[f.id]}</span>
          {f.u&&<span style={{fontSize:11,color:"#666",marginLeft:4}}>{f.u}</span>}
        </div>
      </div>);
    };

    // Render full extracted values (rich view from file upload)
    const renderExtracted=()=>{
      if(!ext||!ext.values?.length)return null;
      return <div style={{...S.cd,marginBottom:10,borderLeft:"3px solid "+st.color}}>
        <div style={{fontSize:11,color:st.color,fontFamily:"'Oswald',sans-serif",letterSpacing:1,marginBottom:10}}>VALORES DETECTADOS DEL ARCHIVO</div>
        {ext.institution&&<div style={{fontSize:11,color:"#888",marginBottom:2}}>🏥 {ext.institution}</div>}
        {ext.requestedBy&&<div style={{fontSize:11,color:"#888",marginBottom:8}}>👨‍⚕️ {ext.requestedBy}</div>}
        {ext.values.map((v,i)=>{
          const sc=v.status==="normal"?"#2ECC71":v.status==="alto"||v.status==="positivo"||v.status==="alterado"?"#E74C3C":v.status==="bajo"?"#F39C12":"#CCC";
          const si=v.status==="normal"?"✓":v.status==="alto"?"↑":v.status==="bajo"?"↓":v.status==="positivo"?"⚠":v.status==="negativo"?"✓":"·";
          return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{flex:1}}><span style={{fontSize:12,color:"#CCC"}}>{v.label}</span>
              {v.reference&&<span style={{fontSize:10,color:"#555",marginLeft:6}}>({v.reference})</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{fontSize:13,color:sc,fontWeight:700}}>{v.value}</span>
              {v.unit&&<span style={{fontSize:11,color:"#666"}}>{v.unit}</span>}
              <span style={{fontSize:12,color:sc,fontWeight:900,width:14}}>{si}</span>
            </div>
          </div>;
        })}
      </div>;
    };

    return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
        <button onClick={()=>{setView("home");setSelStudy(null);setAiRes("");}} style={S.sm}>&#8592;</button>
        <span style={{fontSize:22}}>{st.i}</span>
        <h2 style={{...S.t1,margin:0,flex:1}}>{selStudy.title}</h2>
        <button onClick={()=>doDelete(selStudy.id)} style={{...S.sm,color:"#E74C3C",borderColor:"rgba(231,76,60,0.3)"}}>🗑</button>
      </div>
      <p style={{fontSize:12,color:"#888",marginBottom:16}}>{fd(selStudy.date)}{ext?.institution?" · "+ext.institution:""}</p>

      {/* Rich extracted values from file */}
      {renderExtracted()}

      {/* Structured manual values (if no extracted or in addition) */}
      {!ext&&Object.keys(selStudy.vals||{}).length>0&&<div style={{...S.cd,marginBottom:10}}>{renderVals()}</div>}

      {/* Free text informe */}
      {selStudy.text&&<div style={{...S.cd,marginTop:8}}>
        <div style={{fontSize:11,color:"#888",fontFamily:"'Oswald',sans-serif",letterSpacing:1,marginBottom:8}}>INFORME / HALLAZGOS</div>
        <p style={{fontSize:13,color:"#CCC",lineHeight:1.65,whiteSpace:"pre-wrap",margin:0}}>{selStudy.text}</p>
      </div>}

      {/* Previous analysis */}
      {analysis&&!aiRes&&<div style={{...S.aicd,marginTop:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🧠</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:14,fontWeight:700,color:"#FF6B35"}}>ANÁLISIS CLÍNICO IA</span>
          </div>
          <span style={{fontSize:11,color:"#888"}}>{fd(analysis.date)}</span>
        </div>
        <p style={{fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",color:"#E0E0E0",margin:0}}>{analysis.text}</p>
      </div>}

      {/* Fresh analysis result */}
      {aiRes&&<div style={{...S.aicd,marginTop:12}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <span style={{fontSize:20}}>🧠</span>
          <span style={{fontFamily:"'Oswald',sans-serif",fontSize:14,fontWeight:700,color:"#FF6B35"}}>ANÁLISIS CLÍNICO IA</span>
        </div>
        <p style={{fontSize:13,lineHeight:1.65,whiteSpace:"pre-wrap",color:"#E0E0E0",margin:0}}>{aiRes}</p>
      </div>}

      {/* Analyze button */}
      <button onClick={()=>doAnalyze(selStudy)} disabled={aiLoad}
        style={{...S.btn,width:"100%",marginTop:14,opacity:aiLoad?0.6:1,
          background:aiRes?"rgba(255,107,53,0.15)":"linear-gradient(135deg,#FF6B35,#D62828)",
          border:aiRes?"1px solid rgba(255,107,53,0.4)":"none",
          color:aiRes?"#FF6B35":"#FFF"}}>
        {aiLoad?"⏳ Analizando con guías clínicas...":(aiRes||analysis)?"🔄 Re-analizar":"🧠 Analizar con IA clínica"}
      </button>
      {!apiKey&&<p style={{fontSize:11,color:"#666",textAlign:"center",marginTop:6}}>Necesitás API key en Config.</p>}
    </div>;
  }

  // ── VIEW: TIMELINE ──
  if(view==="timeline"){
    const markers=allBloodMarkers();
    if(timelineMarker){
      const hist=getBloodHistory(timelineMarker);
      const field=BLOOD_PANELS.flatMap(p=>p.fields).find(f=>f.id===timelineMarker)||{l:timelineMarker,u:"",ref:""};
      const vals=hist.map(h=>h.val);
      const mx=vals.length?Math.max(...vals):1,mn=vals.length?Math.min(...vals):0;
      const rng=mx-mn||1;
      return <div style={S.pg}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
          <button onClick={()=>setTimelineMarker(null)} style={S.sm}>&#8592;</button>
          <h2 style={{...S.t1,margin:0}}>{field.l}</h2>
        </div>
        {field.ref&&<div style={{...S.cd,borderLeft:"3px solid rgba(255,255,255,0.2)",marginBottom:16}}>
          <span style={{fontSize:11,color:"#888"}}>Referencia: </span>
          <span style={{fontSize:12,color:"#CCC"}}>{field.ref}</span>
          {field.u&&<span style={{fontSize:11,color:"#666"}}> ({field.u})</span>}
        </div>}
        {hist.length>1&&<div style={{...S.cd,marginBottom:12}}>
          <h4 style={{fontSize:12,color:"#888",margin:"0 0 14px",fontFamily:"'Oswald',sans-serif"}}>EVOLUCIÓN</h4>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:130}}>
            {hist.map((h,i)=>{const hPct=((h.val-mn)/rng)*90+10;return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <span style={{fontSize:10,color:"#FFF",fontWeight:700}}>{h.val}</span>
              <div style={{width:"100%",height:hPct+"%",minHeight:4,background:"linear-gradient(180deg,#1ABC9C,#16A085)",borderRadius:4}}/>
              <span style={{fontSize:8,color:"#666"}}>{h.date.slice(5)}</span>
            </div>;})}
          </div>
        </div>}
        {hist.length<=1&&<div style={S.cd}><p style={{fontSize:13,color:"#888",textAlign:"center"}}>Necesitás al menos 2 estudios con este marcador para ver la evolución.</p></div>}
        {hist.map((h,i)=><div key={i} style={{...S.cd,padding:12,display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:13,color:"#888"}}>{fd(h.date)}</span>
          <div>
            <span style={{fontSize:16,color:"#1ABC9C",fontWeight:700}}>{h.val}</span>
            {field.u&&<span style={{fontSize:11,color:"#666",marginLeft:4}}>{field.u}</span>}
          </div>
        </div>)}
      </div>;
    }
    // Marker selector
    if(!markers.length)return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>setView("home")} style={S.sm}>&#8592;</button>
        <h2 style={S.t1}>Timeline de marcadores</h2>
      </div>
      <div style={S.cd}><p style={{fontSize:13,color:"#888",textAlign:"center"}}>Todavía no hay analíticas de sangre cargadas para trackear evolución.</p></div>
    </div>;
    return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>setView("home")} style={S.sm}>&#8592;</button>
        <h2 style={S.t1}>📈 Timeline de marcadores</h2>
      </div>
      <p style={{fontSize:12,color:"#888",marginBottom:14}}>Seleccioná un marcador para ver su evolución en el tiempo.</p>
      {BLOOD_PANELS.map(panel=>{
        const available=panel.fields.filter(f=>markers.includes(f.id));
        if(!available.length)return null;
        return <div key={panel.id} style={{marginBottom:14}}>
          <div style={{fontSize:11,color:"#E74C3C",fontFamily:"'Oswald',sans-serif",letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>{panel.l}</div>
          {available.map(f=>{
            const hist=getBloodHistory(f.id);
            return <button key={f.id} onClick={()=>setTimelineMarker(f.id)} style={{...S.eo,marginBottom:4}}>
              <span style={{fontSize:13}}>{f.l}</span>
              <div style={{textAlign:"right"}}>
                {hist.length>0&&<span style={{fontSize:13,color:"#1ABC9C",fontWeight:700}}>{hist.at(-1).val} {f.u}</span>}
                <span style={{fontSize:11,color:"#888",marginLeft:6}}>{hist.length} dato{hist.length!==1?"s":""}</span>
              </div>
            </button>;
          })}
        </div>;
      })}
    </div>;
  }

  // ── ANTHROPOMETRY: detail for one metric ──
  if(view==="anthro_detail"&&selAnthroMetric){
    const f=ANTHRO.find(x=>x.id===selAnthroMetric);
    const pts=(data.anthropometry||[]).filter(a=>a[selAnthroMetric]).sort((a,b)=>a.date.localeCompare(b.date));
    const vs=pts.map(p=>Number(p[selAnthroMetric]));
    const mx=vs.length?Math.max(...vs):0,mn2=vs.length?Math.min(...vs):0,rng=mx-mn2||1;
    return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>{setSelAnthroMetric(null);setView("anthro");}} style={S.sm}>&#8592;</button>
        <h2 style={{...S.t1,margin:0}}>{f.l}</h2>
      </div>
      {pts.length>1&&<div style={S.cd}>
        <h4 style={{fontSize:12,color:"#888",margin:"0 0 12px",fontFamily:"'Oswald',sans-serif"}}>EVOLUCIÓN</h4>
        <div style={{display:"flex",alignItems:"flex-end",gap:4,height:120}}>
          {pts.map((p,i)=>{const v=Number(p[selAnthroMetric]);const h=((v-mn2)/rng)*90+10;return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <span style={{fontSize:10,color:"#AAA"}}>{v}</span>
            <div style={{width:"100%",height:h+"%",minHeight:4,background:"linear-gradient(180deg,#FF6B35,#D62828)",borderRadius:4}}/>
            <span style={{fontSize:8,color:"#666"}}>{p.date.slice(5)}</span>
          </div>;})}
        </div>
      </div>}
      {pts.map((p,i)=><div key={i} style={{...S.cd,padding:12,display:"flex",justifyContent:"space-between"}}>
        <span style={{fontSize:13,color:"#888"}}>{fd(p.date)}</span>
        <span style={{fontSize:14,color:"#FF6B35",fontWeight:700}}>{p[selAnthroMetric]} {f.u}</span>
      </div>)}
      {pts.length===0&&<p style={{color:"#888",textAlign:"center",fontSize:14}}>Sin mediciones todavía.</p>}
    </div>;
  }

  // ── ANTHROPOMETRY: add new measurement ──
  if(view==="anthro_add"){
    const doSaveAnthro=()=>{
      const nd={...data,anthropometry:[...(data.anthropometry||[]),{id:gi(),date:anthroDate,...anthroVals}]};
      setData(nd);sv(nd);setAnthroVals({});setView("anthro");
    };
    return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>setView("anthro")} style={S.sm}>&#8592;</button>
        <h2 style={S.t1}>Nueva medición</h2>
      </div>
      <label style={S.lbl}>Fecha</label>
      <input type="date" value={anthroDate} onChange={e=>setAnthroDate(e.target.value)} style={{...S.inp,marginBottom:16}}/>
      <p style={{fontSize:12,color:"#888",marginBottom:12}}>Completá solo lo que tengas. No hace falta todo.</p>
      {ANTHRO.map(f=><div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <label style={{fontSize:13,color:"#CCC",flex:1}}>{f.l}</label>
        <input type="number" value={anthroVals[f.id]||""} onChange={e=>{const nv={...anthroVals};if(e.target.value)nv[f.id]=e.target.value;else delete nv[f.id];setAnthroVals(nv);}} style={{...S.inp,width:80,textAlign:"right"}} step="0.1" placeholder="-"/>
        <span style={{fontSize:11,color:"#888",width:24}}>{f.u}</span>
      </div>)}
      <button onClick={doSaveAnthro} disabled={!Object.keys(anthroVals).length} style={{...S.btn,width:"100%",marginTop:16,opacity:Object.keys(anthroVals).length?1:0.5}}>Guardar</button>
    </div>;
  }

  // ── ANTHROPOMETRY: main view ──
  if(view==="anthro"){
    const allMeasurements=(data.anthropometry||[]).sort((a,b)=>b.date.localeCompare(a.date));
    const latest=allMeasurements[0]||null;
    return <div style={S.pg}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
        <button onClick={()=>setView("home")} style={S.sm}>&#8592;</button>
        <h2 style={S.t1}>📐 Antropometría</h2>
      </div>
      <button onClick={()=>setView("anthro_add")} style={{...S.btn,width:"100%",marginBottom:16}}>+ Nueva medición</button>
      {!latest&&<div style={S.cd}>
        <p style={{fontSize:13,color:"#888",textAlign:"center",lineHeight:1.6}}>Cargá tus mediciones antropométricas — peso, perímetros, pliegues y composición corporal. Idealmente con un profesional con certificación ISAK.</p>
      </div>}
      {latest&&<div style={{marginBottom:16}}>
        <h3 style={{...S.t1,fontSize:14}}>Última medición — {fd(latest.date)}</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {ANTHRO.filter(f=>latest[f.id]).map(f=><button key={f.id} onClick={()=>{setSelAnthroMetric(f.id);setView("anthro_detail");}} style={{...S.cd,padding:"10px 12px",cursor:"pointer",marginBottom:0,textAlign:"left"}}>
            <span style={{fontSize:11,color:"#888",display:"block"}}>{f.l}</span>
            <span style={{...S.stv,fontSize:20,marginTop:4,display:"block"}}>{latest[f.id]}<span style={S.stu}> {f.u}</span></span>
          </button>)}
        </div>
      </div>}
      {allMeasurements.length>1&&<div>
        <h3 style={{...S.t1,fontSize:14}}>Historial</h3>
        {allMeasurements.slice(1).map((m,i)=><div key={i} style={{...S.cd,padding:12}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6}}>{fd(m.date)}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {ANTHRO.filter(f=>m[f.id]).map(f=><span key={f.id} style={{fontSize:12,color:"#CCC"}}>{f.l}: <span style={{color:"#FF6B35",fontWeight:700}}>{m[f.id]}{f.u}</span></span>)}
          </div>
        </div>)}
      </div>}
    </div>;
  }

  // ── VIEW: HOME ──
  const byType={};
  studies.forEach(s=>{if(!byType[s.type])byType[s.type]=[];byType[s.type].push(s);});
  const lastStudy=studies.length?studies.sort((a,b)=>b.date.localeCompare(a.date))[0]:null;

  return <div style={S.pg}>
    <h2 style={S.t1}>🩺 Salud</h2>

    {/* Quick actions */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
      <button onClick={()=>setView("add")} style={{...S.btn,padding:"14px 12px",fontSize:14}}>+ Cargar estudio</button>
      <button onClick={()=>setView("timeline")} style={{...S.cd,cursor:"pointer",marginBottom:0,textAlign:"center",padding:"14px 12px",border:"1px solid rgba(26,188,156,0.3)"}}>
        <div style={{fontSize:20,marginBottom:2}}>📈</div>
        <div style={{fontSize:12,color:"#1ABC9C",fontWeight:600}}>Timeline</div>
      </button>
    </div>

    {/* Anthropometry card */}
    {(()=>{
      const latest=(data.anthropometry||[]).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
      return <button onClick={()=>setView("anthro")} style={{...S.cd,cursor:"pointer",width:"100%",textAlign:"left",marginBottom:14,borderLeft:"3px solid #FF6B35",display:"block"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>📐</span>
            <span style={{fontFamily:"'Oswald',sans-serif",fontSize:15,color:"#FFF",fontWeight:700}}>Antropometría</span>
          </div>
          <span style={{fontSize:18,color:"#FF6B35"}}>&#8594;</span>
        </div>
        {latest?<div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
          {latest.weight&&<span style={{fontSize:12,color:"#CCC"}}>Peso: <span style={{color:"#FF6B35",fontWeight:700}}>{latest.weight} kg</span></span>}
          {latest.body_fat&&<span style={{fontSize:12,color:"#CCC"}}>%Grasa: <span style={{color:"#FF6B35",fontWeight:700}}>{latest.body_fat}%</span></span>}
          {latest.muscle_mass&&<span style={{fontSize:12,color:"#CCC"}}>Masa musc: <span style={{color:"#FF6B35",fontWeight:700}}>{latest.muscle_mass} kg</span></span>}
          <span style={{fontSize:11,color:"#888"}}>{fd(latest.date)}</span>
        </div>:<p style={{fontSize:12,color:"#666",margin:"6px 0 0"}}>Sin mediciones. Tocá para cargar.</p>}
      </button>;
    })()}

    {/* Cross-context summary */}
    {studies.length>0&&<div style={{...S.cd,borderLeft:"3px solid rgba(26,188,156,0.4)",background:"rgba(26,188,156,0.04)",marginBottom:14}}>
      <div style={{fontSize:11,color:"#1ABC9C",fontFamily:"'Oswald',sans-serif",letterSpacing:1,marginBottom:6}}>CONTEXTO INTEGRADO</div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        <div><span style={{fontSize:20,fontFamily:"'Oswald',sans-serif",color:"#FFF",fontWeight:700}}>{studies.length}</span><span style={{fontSize:11,color:"#888",display:"block",marginTop:2}}>Estudios</span></div>
        <div><span style={{fontSize:20,fontFamily:"'Oswald',sans-serif",color:"#FFF",fontWeight:700}}>{(data.anthropometry||[]).length}</span><span style={{fontSize:11,color:"#888",display:"block",marginTop:2}}>Mediciones</span></div>
        <div><span style={{fontSize:20,fontFamily:"'Oswald',sans-serif",color:"#FFF",fontWeight:700}}>{(data.sessions||[]).length}</span><span style={{fontSize:11,color:"#888",display:"block",marginTop:2}}>Sesiones</span></div>
        {lastStudy&&<div><span style={{fontSize:11,color:"#888",display:"block",marginTop:2}}>Último estudio:</span><span style={{fontSize:12,color:"#CCC"}}>{fd(lastStudy.date)}</span></div>}
      </div>
    </div>}

    {/* Studies by type */}
    {studies.length===0&&(data.anthropometry||[]).length===0&&<div style={S.cd}>
      <p style={{fontSize:13,color:"#888",textAlign:"center",lineHeight:1.6}}>Cargá tus estudios clínicos y mediciones antropométricas. El médico IA los analiza con guías ACC/AHA, ESC, ADA, ERS, AASM, SAC y más.</p>
    </div>}

    {Object.entries(byType).map(([type,sts])=>{
      const st=stInfo(type);
      const sorted=[...sts].sort((a,b)=>b.date.localeCompare(a.date));
      return <div key={type} style={{marginBottom:16}}>
        <div style={{fontSize:11,fontFamily:"'Oswald',sans-serif",letterSpacing:1,textTransform:"uppercase",color:st.color,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:14}}>{st.i}</span>{st.l}
          <span style={{fontSize:10,color:"#666",marginLeft:4}}>({sorted.length})</span>
        </div>
        {sorted.map(s=><button key={s.id} onClick={()=>{setSelStudy({...s,lastAnalysis:s.lastAnalysis});setView("study");setAiRes("");}} style={{...S.eo,marginBottom:5,borderLeft:"3px solid "+st.color}}>
          <div>
            <div style={{fontSize:14,color:"#FFF",fontWeight:600}}>{s.title}</div>
            <div style={{fontSize:12,color:"#888",marginTop:2}}>{fd(s.date)}</div>
            {s.lastAnalysis&&<div style={{fontSize:11,color:"#FF6B35",marginTop:2}}>🧠 Analizado {fd(s.lastAnalysis.date)}</div>}
          </div>
          <span style={{color:st.color,fontSize:18}}>&#8594;</span>
        </button>)}
      </div>;
    })}
  </div>;
}

// ─── APP ───
function App(){
  const[data,setData]=useState(EMPTY);const[tab,setTab]=useState("plan");const[loading,setLoading]=useState(true);const[apiKey,setAK]=useState("");
  useEffect(()=>{const d=ld();if(d){if(!d.anthropometry)d.anthropometry=[];if(d.phase===undefined)d.phase=0;if(!d.planNotes)d.planNotes=[];if(!d.cardioSessions)d.cardioSessions=[];if(!d.coachNotes)d.coachNotes=[];if(!d.meals)d.meals=[];if(!d.weeklyNutrPlan)d.weeklyNutrPlan=null;if(!d.clinicalStudies)d.clinicalStudies=[];setData(d)}setAK(gk());setLoading(false)},[]);
  const handleKey=k=>{setAK(k);stk(k)};
  if(loading)return <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#0A0A0B"}}><Logo size={64}/><h1 style={{fontFamily:"'Oswald',sans-serif",fontSize:28,color:"#FFF",margin:"16px 0 0"}}>FORJA</h1></div>;
  return <div style={S.app}>
    <div style={S.hdr}><div style={{display:"flex",alignItems:"center",gap:10}}><Logo size={32}/><span style={{fontFamily:"'Oswald',sans-serif",fontSize:22,fontWeight:700,letterSpacing:3,color:"#FFF"}}>FORJA</span></div><span style={{fontSize:10,color:"#666",fontFamily:"'Oswald',sans-serif",letterSpacing:2}}>SALUD CON CIENCIA</span></div>
    <div style={S.cnt}>
      {tab==="plan"&&<PlanTab data={data} setData={setData}/>}
      {tab==="workout"&&<WorkoutTab data={data} setData={setData} apiKey={apiKey}/>}
      {tab==="cardio"&&<CardioTab data={data} setData={setData}/>}
      {tab==="nutrition"&&<NutritionTab data={data} setData={setData} apiKey={apiKey}/>}
      {tab==="health"&&<HealthTab data={data} setData={setData} apiKey={apiKey}/>}
      {tab==="progress"&&<ProgressTab data={data}/>}
      {tab==="settings"&&<SettingsTab apiKey={apiKey} onApiKeyChange={handleKey}/> }
    </div>
    <TabBar active={tab} onChange={setTab}/>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
