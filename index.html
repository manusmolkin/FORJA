function tgt(hist){
  if(!hist?.length)return null;
  const last=hist.at(-1),sets=last.sets||[];
  if(!sets.length)return null;
  const avg=sets.reduce((s,x)=>s+x.reps,0)/sets.length,mw=Math.max(...sets.map(s=>s.weight));
  let tw=mw,tr=Math.round(avg),ts=sets.length,sug="";
  if(avg>=12){tw=Math.ceil((mw*1.025)/0.5)*0.5;tr=8;sug="Subir peso a "+tw+"kg. Apuntar a 8 reps."}
  else if(avg>=8){tr=Math.round(avg)+1;sug="Mantener "+mw+"kg. Apuntar a "+tr+" reps."}
  else if(avg>=6){if(sets.length<5){ts=sets.length+1;sug="Mantener "+mw+"kg x "+Math.round(avg)+" reps. +1 serie ("+ts+")."}else{tr=Math.round(avg)+1;sug="Mantener "+mw+"kg. Intentar "+tr+" reps."}}
  else{tw=Math.floor((mw*0.95)/0.5)*0.5;tr=8;sug="Reducir a "+tw+"kg para 8 reps con tecnica."}
  return{targetWeight:tw,targetReps:tr,targetSets:ts,suggestion:sug};
}

function buildPrompt(ses,all,fb,meals){
  const exd=ses.exercises.map(ex=>{const ss=ex.sets.map((s,i)=>"  S"+(i+1)+": "+s.weight+"kg x "+s.reps).join("\n");return ex.name+" ("+MG[ex.muscleGroup]?.l+"):\n"+ss}).join("\n\n");
  const recent=all.slice(-5).map(s=>fd(s.date)+": "+[...new Set(s.exercises.map(e=>MG[e.muscleGroup]?.l))].join(", ")).join("\n");
  const todayMeals=(meals||[]).filter(m=>m.date===ses.date);
  const nutCtx=todayMeals.length>0?"Alimentacion del dia:\n"+todayMeals.map(m=>{let txt=MEAL_TYPES.find(t=>t.id===m.type)?.l+": "+m.food;if(m.kcal)txt+=" ("+m.kcal+"kcal";if(m.protein)txt+=", "+m.protein+"g prot";if(m.carbs)txt+=", "+m.carbs+"g carb";if(m.fat)txt+=", "+m.fat+"g grasa";if(m.kcal||m.protein)txt+=")";return txt}).join("\n"):"";
  return "Sos un coach de fuerza e hipertrofia basado en evidencia (ACSM, NSCA, Schoenfeld).\nSesion completada:\nFecha: "+fd(ses.date)+"\nEjercicios:\n"+exd+"\nRecientes:\n"+recent+"\n"+(nutCtx?nutCtx+"\n":"")+"\nComentario: \""+fb+"\"\n\nEl usuario viene de varios meses sin entrenar y esta en fase de readaptacion/retorno.\nResponde en espanol, conciso (max 220 palabras). Evalua:\n1. Volumen e intensidad (son adecuados para su nivel actual?)\n2. Recomendaciones concretas para la proxima sesion\n3. Si deberia mantenerse en la fase actual o avanzar a la siguiente\n4. Frecuencia y recuperacion\n"+(nutCtx?"5. Comentario breve sobre la alimentacion del dia en relacion al entreno\n":"")+"Se directo y practico.";
}

async function callAI(prompt,key){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content?.map(c=>c.text||"").join("")||"Sin respuesta.";
}

function Logo({size=40}){return <svg width={size} height={size} viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="20" fill="url(#fg2)"/><defs><linearGradient id="fg2" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stopColor="#FF6B35"/><stop offset="100%" stopColor="#D62828"/></linearGradient></defs><path d="M25 65 L75 65 L70 55 L65 45 L35 45 L30 55 Z" fill="#FFF" opacity="0.95"/><rect x="40" y="30" width="20" height="18" rx="3" fill="#FFF" opacity="0.95"/><rect x="20" y="65" width="60" height="6" rx="3" fill="#FFF" opacity="0.7"/><circle cx="72" cy="32" r="3" fill="#FFD166"/><circle cx="78" cy="26" r="2" fill="#FFD166" opacity="0.7"/><circle cx="65" cy="28" r="1.5" fill="#FFD166" opacity="0.5"/></svg>}

function TabBar({active,onChange}){
  const tabs=[{id:"plan",l:"Plan",i:"\u{1F4C5}"},{id:"workout",l:"Entreno",i:"\u{1F3CB}\uFE0F"},{id:"cardio",l:"Cardio",i:"\u{1F3C3}"},{id:"nutrition",l:"Comida",i:"\u{1F957}"},{id:"body",l:"Cuerpo",i:"\u{1F4D0}"},{id:"progress",l:"Progreso",i:"\u{1F4CA}"},{id:"settings",l:"Config",i:"\u2699\uFE0F"}];
  return <div style={S.tbar}>{tabs.map(t=><button key={t.id} onClick={()=>onChange(t.id)} style={{...S.tab,...(active===t.id?S.tabA:{})}}><span style={{fontSize:16}}>{t.i}</span><span style={{fontWeight:active===t.id?700:400}}>{t.l}</span></button>)}</div>;
}

// ─── PLAN TAB ───
function PlanTab({data,setData}){
  const ph=PHASES[data.phase||0];
  const[selDay,setSelDay]=useState(null);
  if(selDay!==null){const day=ph.schedule[selDay];return <div style={S.pg}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><button onClick={()=>setSelDay(null)} style={S.sm}>&#8592;</button><h2 style={{...S.t1,margin:0}}>{day.day}: {day.name}</h2></div>
    <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>{day.muscles.map(g=><span key={g} style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:MG[g]?.c+"22",color:MG[g]?.c,fontWeight:600}}>{MG[g]?.l}</span>)}</div>
    {day.exercises.map((ex,i)=><div key={i} style={S.cd}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><h3 style={{fontSize:15,fontFamily:"'Oswald',sans-serif",color:"#FFF",margin:0}}>{ex.n}</h3><span style={{fontSize:13,color:"#FF6B35",fontWeight:700}}>{ex.s} x {ex.r}</span></div>
      {ex.w&&<div style={{fontSize:13,color:"#2ECC71",marginTop:6,fontWeight:600}}>Peso sugerido: {ex.w}</div>}
      <div style={{fontSize:12,color:"#888",marginTop:4}}>Descanso: {ex.rest}</div>
      {ex.note&&<p style={{fontSize:12,color:"#AAA",marginTop:4,fontStyle:"italic"}}>{ex.note}</p>}
    </div>)}
  </div>}
  return <div style={S.pg}>
    <h2 style={S.t1}>{"\u{1F4C5}"} Plan de entrenamiento</h2>
    <div style={{...S.cd,borderLeft:"3px solid "+ph.c,background:"linear-gradient(135deg,"+ph.c+"15,"+ph.c+"05)"}}>
      <span style={{fontSize:32}}>{ph.ic}</span>
      <h3 style={{fontFamily:"'Oswald',sans-serif",fontSize:20,color:ph.c,margin:"4px 0"}}>{ph.name}</h3>
      <p style={{fontSize:13,color:"#AAA"}}>Semanas {ph.wk} - {ph.days} dias/semana</p>
      <p style={{fontSize:12,color:"#888",marginTop:4}}>{ph.desc}</p>
    </div>
    <h3 style={{...S.t1,fontSize:14,marginTop:16}}>Sesiones de la semana</h3>
    {ph.schedule.map((day,i)=><button key={i} onClick={()=>setSelDay(i)} style={S.eo}>
      <div><span style={{fontWeight:700,color:"#FFF"}}>{day.day}</span><br/><span style={{fontSize:12,color:"#AAA"}}>{day.name}</span></div>
      <span style={{fontSize:12,color:ph.c}}>{day.exercises.length} ej. &#8594;</span>
    </button>)}
    <h3 style={{...S.t1,fontSize:14,marginTop:16}}>{"\u{1F3C3}"} Cardio</h3>
    <div style={S.cd}><p style={{fontSize:13,color:"#CCC"}}>{ph.cardio}</p></div>
    <h3 style={{...S.t1,fontSize:14,marginTop:16}}>{"\u{1F3AF}"} Objetivos</h3>
    {ph.goals.map((g,i)=><div key={i} style={{...S.cd,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}><span style={{color:ph.c,fontSize:14}}>&#8226;</span><p style={{fontSize:13,color:"#CCC",margin:0}}>{g}</p></div>)}
    <div style={{...S.cd,marginTop:16,borderLeft:"3px solid "+ph.rpe.color,background:ph.rpe.color+"0A"}}>
      <h4 style={{fontSize:13,fontFamily:"'Oswald',sans-serif",color:ph.rpe.color,margin:"0 0 8px"}}>INTENSIDAD: {ph.rpe.title}</h4>
      <p style={{fontSize:12,color:"#CCC",lineHeight:1.6,margin:0}}>{ph.rpe.desc}</p>
    </div>
    <div style={{...S.cd,marginTop:10,borderLeft:"3px solid #9B59B6",background:"rgba(155,89,182,0.06)"}}>
      <h4 style={{fontSize:13,fontFamily:"'Oswald',sans-serif",color:"#9B59B6",margin:"0 0 8px"}}>HABLAR CON EL COACH IA</h4>
      <p style={{fontSize:12,color:"#CCC",lineHeight:1.6,margin:0}}>Al terminar cada sesion en la pestana <b style={{color:"#FFF"}}>"Entreno"</b>, escribi como te sentiste. El Coach IA te dice si subir/bajar peso, si cambiar series/reps, y si estas listo para avanzar de fase. Necesitas API key en Config.</p>
    </div>
    {data.planNotes?.length>0&&<div style={{marginTop:16}}><h3 style={{...S.t1,fontSize:14}}>{"\u{1F9E0}"} Notas del Coach sobre el plan</h3><div style={S.aicd}><p style={{fontSize:13,lineHeight:1.5,color:"#CCC",whiteSpace:"pre-wrap"}}>{data.planNotes.at(-1).note}</p><p style={{fontSize:11,color:"#888",marginTop:8}}>{fd(data.planNotes.at(-1).date)}</p></div></div>}
    <div style={{marginTop:20}}>
      <h3 style={{...S.t1,fontSize:14}}>Todas las fases</h3>
      {PHASES.map((p,i)=><div key={i} style={{...S.cd,padding:"10px 14px",borderLeft:"3px solid "+p.c,opacity:i===(data.phase||0)?1:0.5,cursor:"pointer"}} onClick={()=>{const nd={...data,phase:i};setData(nd);sv(nd)}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,fontFamily:"'Oswald',sans-serif",color:i===(data.phase||0)?p.c:"#888"}}>{p.ic} {p.name}</span><span style={{fontSize:11,color:"#888"}}>Sem {p.wk} - {p.days}d/sem</span></div>
      </div>)}
    </div>
  </div>;
}

// ─── BODY TAB ───
function BodyTab({data,setData}){
  const[adding,setAdding]=useState(false);
  const[vals,setVals]=useState({});
  const[date,setDate]=useState(td());
  const[selM,setSelM]=useState(null);
  const doSave=()=>{const nd={...data,anthropometry:[...(data.anthropometry||[]),{id:gi(),date,...vals}]};setData(nd);sv(nd);setAdding(false);setVals({})};
  if(selM){const f=ANTHRO.find(x=>x.id===selM);const pts=(data.anthropometry||[]).filter(a=>a[selM]).sort((a,b)=>a.date.localeCompare(b.date));const vs=pts.map(p=>Number(p[selM]));const mx=vs.length?Math.max(...vs):0;const mn=vs.length?Math.min(...vs):0;const rng=mx-mn||1;
    return <div style={S.pg}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><button onClick={()=>setSelM(null)} style={S.sm}>&#8592;</button><h2 style={{...S.t1,margin:0}}>{f.l}</h2></div>
    {pts.length>1&&<div style={S.cd}><h4 style={{fontSize:13,color:"#888",margin:"0 0 12px",fontFamily:"'Oswald',sans-serif"}}>EVOLUCION</h4><div style={{display:"flex",alignItems:"flex-end",gap:4,height:120}}>{pts.map((p,i)=>{const v=Number(p[selM]);const h=((v-mn)/rng)*90+10;return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:10,color:"#AAA"}}>{v}</span><div style={{width:"100%",height:h+"%",minHeight:4,background:"linear-gradient(180deg,#FF6B35,#D62828)",borderRadius:4}}/><span style={{fontSize:8,color:"#666"}}>{p.date.slice(5)}</span></div>})}</div></div>}
    {pts.map((p,i)=><div key={i} style={{...S.cd,padding:12,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,color:"#888"}}>{fd(p.date)}</span><span style={{fontSize:14,color:"#FF6B35",fontWeight:700}}>{p[selM]} {f.u}</span></div>)}
    {pts.length===0&&<p style={{color:"#888",textAlign:"center",fontSize:14}}>Sin mediciones.</p>}
    </div>}
  if(adding)return <div style={S.pg}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><button onClick={()=>setAdding(false)} style={S.sm}>&#8592;</button><h2 style={S.t1}>Nueva medicion</h2></div>
    <label style={S.lbl}>Fecha</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...S.inp,marginBottom:16}}/>
    <p style={{fontSize:12,color:"#888",marginBottom:12}}>Completa solo lo que tengas. No hace falta todo.</p>
    {ANTHRO.map(f=><div key={f.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
      <label style={{fontSize:13,color:"#CCC",flex:1}}>{f.l}</label>
      <input type="number" value={vals[f.id]||""} onChange={e=>{const nv={...vals};if(e.target.value)nv[f.id]=e.target.value;else delete nv[f.id];setVals(nv)}} style={{...S.inp,width:80,textAlign:"right"}} step="0.1" placeholder="-"/>
      <span style={{fontSize:11,color:"#888",width:24}}>{f.u}</span>
    </div>)}
    <button onClick={doSave} disabled={!Object.keys(vals).length} style={{...S.btn,width:"100%",marginTop:16,opacity:Object.keys(vals).length?1:0.5}}>Guardar</button>
  </div>;
  const latest=(data.anthropometry||[]).length?(data.anthropometry||[]).sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
  return <div style={S.pg}><h2 style={S.t1}>{"\u{1F4D0}"} Cuerpo</h2><button onClick={()=>setAdding(true)} style={{...S.btn,width:"100%",marginBottom:20}}>+ Nueva medicion</button>
    {latest&&<div style={{marginBottom:16}}><h3 style={{...S.t1,fontSize:14}}>Ultima medicion - {fd(latest.date)}</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{ANTHRO.filter(f=>latest[f.id]).map(f=><button key={f.id} onClick={()=>setSelM(f.id)} style={{...S.cd,padding:"10px 12px",cursor:"pointer",marginBottom:0}}><span style={{fontSize:11,color:"#888"}}>{f.l}</span><span style={{...S.stv,fontSize:20,marginTop:4}}>{latest[f.id]}<span style={S.stu}> {f.u}</span></span></button>)}</div></div>}
    {!latest&&<div style={S.cd}><p style={{fontSize:13,color:"#888",textAlign:"center"}}>Hacete una antropometria con un nutricionista deportivo (certificacion ISAK) y carga los datos aca.</p></div>}
  </div>;
}

// ─── WORKOUT TAB ───
function WorkoutTab({data,setData,apiKey}){
  const[ses,setSes]=useState(null);const[sg,setSg]=useState(null);const[showFb,setShowFb]=useState(false);const[fb,setFb]=useState("");const[aiRes,setAiRes]=useState("");const[aiLoad,setAiLoad]=useState(false);
  const start=()=>{setSes({id:gi(),date:td(),exercises:[]});setSg(null)};
  const addEx=(name,group)=>{const hist=data.sessions.flatMap(s=>s.exercises).filter(e=>e.name===name);const t2=tgt(hist);setSes(s=>({...s,exercises:[...s.exercises,{id:gi(),name,muscleGroup:group,sets:t2?Array.from({length:t2.targetSets},()=>({weight:t2.targetWeight,reps:t2.targetReps,done:false})):[{weight:0,reps:10,done:false}],targets:t2}]}));setSg(null)};
  const upSet=(eid,idx,f,v)=>setSes(s=>({...s,exercises:s.exercises.map(ex=>ex.id===eid?{...ex,sets:ex.sets.map((st,i)=>i===idx?{...st,[f]:f==="done"?v:Number(v)}:st)}:ex)}));
  const addSet=(eid)=>setSes(s=>({...s,exercises:s.exercises.map(ex=>ex.id===eid?{...ex,sets:[...ex.sets,{weight:ex.sets.at(-1)?.weight||0,reps:ex.sets.at(-1)?.reps||10,done:false}]}:ex)}));
  const rmSet=(eid,idx)=>setSes(s=>({...s,exercises:s.exercises.map(ex=>ex.id===eid?{...ex,sets:ex.sets.filter((_,i)=>i!==idx)}:ex)}));
  const rmEx=eid=>setSes(s=>({...s,exercises:s.exercises.filter(ex=>ex.id!==eid)}));
  const submit=async()=>{setAiLoad(true);const toSave={...ses,feedback:fb};const ns=[...data.sessions,toSave];const nd={...data,sessions:ns};
    if(apiKey){try{const txt=await callAI(buildPrompt(toSave,ns,fb,data.meals),apiKey);setAiRes(txt);nd.coachNotes=[...nd.coachNotes,{sessionId:toSave.id,date:toSave.date,note:txt,feedback:fb}];nd.planNotes=[...(nd.planNotes||[]),{date:toSave.date,note:txt}]}catch(e){setAiRes("Error: "+e.message)}}
    else{setAiRes("Sin API key. Sesion guardada. Anda a Config.")}
    setData(nd);sv(nd);setAiLoad(false)};
  const reset=()=>{setSes(null);setShowFb(false);setFb("");setAiRes("")};

  if(showFb)return <div style={S.pg}><h2 style={S.t1}>{"\u{1F4DD}"} Como estuvo?</h2>{!aiRes?<><textarea value={fb} onChange={e=>setFb(e.target.value)} placeholder="Como te sentiste? Pesado? Facil? Dolor? Dormiste bien?" style={S.ta} rows={5}/><button onClick={submit} disabled={!fb.trim()||aiLoad} style={{...S.btn,opacity:!fb.trim()||aiLoad?0.5:1,width:"100%",marginTop:12}}>{aiLoad?"\u{1F525} Analizando...":"Enviar al Coach IA"}</button></>:<div style={S.aicd}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}><span style={{fontSize:24}}>{"\u{1F9E0}"}</span><span style={{fontFamily:"'Oswald',sans-serif",fontSize:16,fontWeight:700,color:"#FF6B35"}}>COACH FORJA</span></div><p style={{fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",color:"#E0E0E0"}}>{aiRes}</p><button onClick={reset} style={{...S.btn,marginTop:16,width:"100%"}}>Cerrar</button></div>}</div>;

  if(!ses){const last=data.sessions.at(-1);return <div style={S.pg}><div style={S.hero}><span style={{fontSize:48}}>{"\u{1F525}"}</span><h2 style={{fontFamily:"'Oswald',sans-serif",fontSize:22,margin:"8px 0 4px"}}>Listo para forjar?</h2><p style={{fontSize:13,color:"#AAA",margin:0}}>{last?"Ultima: "+fd(last.date):"Comenza a registrar"}</p><button onClick={start} style={{...S.btn,marginTop:16,width:"100%"}}>Iniciar sesion</button></div>{data.coachNotes.length>0&&<div style={{marginTop:20}}><h3 style={S.t1}>{"\u{1F9E0}"} Coach</h3><div style={S.aicd}><p style={{fontSize:13,lineHeight:1.5,color:"#CCC",whiteSpace:"pre-wrap"}}>{data.coachNotes.at(-1).note}</p><p style={{fontSize:11,color:"#888",marginTop:8}}>{fd(data.coachNotes.at(-1).date)}</p></div></div>}</div>}

  return <div style={S.pg}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={S.t1}>Sesion en curso</h2><span style={{fontSize:12,color:"#888"}}>{fd(ses.date)}</span></div>
    {ses.exercises.map(ex=><div key={ex.id} style={S.cd}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:12,color:MG[ex.muscleGroup]?.c,fontWeight:700}}>{MG[ex.muscleGroup]?.i} {MG[ex.muscleGroup]?.l}</span><h3 style={{margin:"4px 0 0",fontSize:16,fontFamily:"'Oswald',sans-serif",color:"#FFF"}}>{ex.name}</h3></div><button onClick={()=>rmEx(ex.id)} style={S.sm}>x</button></div>{ex.targets&&<div style={S.tbdg}>{"\u{1F3AF}"} {ex.targets.suggestion}</div>}<div style={{marginTop:12}}><div style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 40px 40px",gap:6,marginBottom:6}}><span style={S.colh}>#</span><span style={S.colh}>Kg</span><span style={S.colh}>Reps</span><span style={S.colh}>Ok</span><span></span></div>{ex.sets.map((set,idx)=><div key={idx} style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 40px 40px",gap:6,alignItems:"center",marginBottom:4,opacity:set.done?0.6:1}}><span style={{fontSize:13,color:"#888",textAlign:"center"}}>{idx+1}</span><input type="number" value={set.weight} onChange={e=>upSet(ex.id,idx,"weight",e.target.value)} style={S.inp} step="0.5"/><input type="number" value={set.reps} onChange={e=>upSet(ex.id,idx,"reps",e.target.value)} style={S.inp}/><button onClick={()=>upSet(ex.id,idx,"done",!set.done)} style={{...S.chk,background:set.done?"#2ECC71":"rgba(255,255,255,0.05)",color:set.done?"#FFF":"#666"}}>&#10003;</button><button onClick={()=>rmSet(ex.id,idx)} style={S.sm}>-</button></div>)}<button onClick={()=>addSet(ex.id)} style={S.aset}>+ Serie</button></div></div>)}
    {!sg?<div><h3 style={{...S.t1,fontSize:14,marginTop:20}}>Agregar ejercicio</h3><div style={S.mg2}>{Object.entries(MG).map(([k,v])=><button key={k} onClick={()=>setSg(k)} style={S.mb2}><span style={{fontSize:22}}>{v.i}</span><span style={{fontSize:11,color:v.c,fontWeight:600}}>{v.l}</span></button>)}</div></div>:<div><div style={{display:"flex",alignItems:"center",gap:8,marginTop:16,marginBottom:8}}><button onClick={()=>setSg(null)} style={S.sm}>&#8592;</button><h3 style={{fontSize:14,color:MG[sg].c,margin:0,fontFamily:"'Oswald',sans-serif"}}>{MG[sg].i} {MG[sg].l}</h3></div><div style={{display:"flex",flexDirection:"column",gap:4}}>{(EC[sg]||[]).map(n=><button key={n} onClick={()=>addEx(n,sg)} style={S.eo}>{n}</button>)}</div></div>}
    {ses.exercises.length>0&&<button onClick={()=>setShowFb(true)} style={{...S.btn,marginTop:24,width:"100%"}}>Finalizar {"\u{1F525}"}</button>}
  </div>;
}

// ─── CARDIO TAB ───
function CardioTab({data,setData}){
  const[adding,setAdding]=useState(false);const[type,setType]=useState("running");const[p,setP]=useState("");const[s2,setS2]=useState("");const[date,setDate]=useState(td());const[notes,setNotes]=useState("");
  const doSave=()=>{const nd={...data,cardioSessions:[...data.cardioSessions,{id:gi(),type,primary:Number(p),secondary:Number(s2),date,notes}]};setData(nd);sv(nd);setAdding(false);setP("");setS2("");setNotes("")};
  const del=id=>{const nd={...data,cardioSessions:data.cardioSessions.filter(c=>c.id!==id)};setData(nd);sv(nd)};

      try{plan=JSON.parse(clean);}
      catch(e){
        // Intenta cerrar JSON truncado
        const stack=[];let fixed=clean;
